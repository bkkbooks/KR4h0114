具體得者稀今日海邊親見之滿堂光焰動鱗甲倒挾海水空中飛凌風直上九天去天下蒼生望霖雨太平天子居九重黍稷穰穰千萬古題夀監司所藏瘦馬圖沙場日暮春草肥瘦馬不受黃金羈天生神駿天所愛豈容過事無人知郎官病坐芙蓉幕喜見馬圖天上落人生相遇貴相知孰謂世間無伯樂和題吳間間京館王本中醉作竹石壁上硯屏花落丹水香步虛白日聲琅琅江南道士愛瀟灑新粉素壁如秋霜王郎酒後衫袖濕醉眼朦朧電光急黑龍雲重雨腳斜白兔秋髙月中泣倦遊借榻日觀東恍惚舊夢三湘中鷓鴣聲斷江路逺青松雨暗春濛濛髙唐劉侯定齊野𤣥亭淮隂季年韓將軍狡兔已死走狗烹沛中白髮周將軍碧色已滿細栁營何如髙唐劉將軍太平不許矢石勳掉頭青海無傳箭天山掛却烏腳巾歸來買地築小亭漯水為鏡山為屏樵人溪叟日相過野歌村舞醉復醒去年偶爾劍㦸鳴潼關馬過戰血腥白頭老子如不聞牛背一笑千山青補闕歌錢塘三日風雨急古銅夜光飛霹靂知是神物出人間猶帶吳宫土花碧玉橋素練懸銀河支機女兒飛鳳梭蝦鬚風軟亂纎影春水日晴生潮波破窗冷硯留不得零落江南酒家客狂歌索酒仰面歇誤擊紅籌唾壺裂何人進入蓬萊宫銀屏碧幕珠簾重此身補闕亦何用玉龍㵼水流芙蓉贈別鷲峯上人并引豫遷官出閩過建陽㑹同年邀豫至其家因登溪閣俄聞茂林修竹間有絃誦之聲詢世文乃靈山上人也頃之相㑹閣上臞然如鶴悠然如閒雲出所作詩一帙蕭然有林下風也豫南出閩世文亦將赴官編修鷲峯送豫溪上徘徊顧望有不忍別意鷲峯湖南人本姓歐陽靈其釋名鷲峯其自號乃座主翰林侍讀歐陽之族也建溪秋髙山水清溪邊偶識衡陽僧臨水洗鉢掛溪閣夜訪校書天祿燈聖經佛偈通宵讀苜蓿堆盤勝食肉回雁峯南難寄書武夷洞前堪煮粥西風獵獵吹水寒相送郎官南出關校書公子玉京出衡陽上人何日還手中玉杖春雨緑母乃湘君廟前竹胡不截作雙鳳簫吹作來儀舜庭曲古曲雅以淡天髙難上聞不如且拄杖頭月歸卧祝融峯畔雲題郭元二公畫壁兩山出沒如虎頭爭竒角怪不肯休一山如龍入雲去一山化作長江流崚嶒相雄不相下欲向人間索髙價塵中有客語如狂龍者可先江者亞一笑上馬歸醉眠麯生使我多妄言酒醒忽記夜來語先者姓郭亞者元送友人之金陵陳郎買舟上金陵寒江水落風浪小飛帆逺掛蔣山青空城畫角秦淮曉白門酒美香滿城吳姬唤客客不行樓中子弟盡年少玉奴行酒吹鸞笙陳郎不聽黃金縷朝走東吳暮走楚半生落魄一布袍感慨長歌弔千古六朝遺跡生暮烟故家荒冢迷花鈿鳳凰臺上酹李白何人知子囊無錢雪霽訪馮道士不遇道人已跨龍潭鶴童子能烹雀舌茶一夜山中滿林雪客來無處覔梅花宫詞楊柳樓心月滿床錦屏繡褥夜生香不知門外春多少半醉移燈看海棠秋詞清夜宫車出建章紫衣小隊兩三行石䦨干外銀鐙過照見芙蓉葉上霜西宫即事九重五色金銀闕冠帶將軍盡羽林白髮儒臣方進講西宫午漏隔花深贈道士陳華隱早年濯足東海水去卧華峯頂上雲收得九秋仙掌露歸來酌獻武夷君過髙郵射陽湖飄蕭樹稍風浙瀝湖上雨不見打魚人菰蒲鴈相語西湖絶句六首湧金門外上湖船狂客風流憶往年十八女兒搖艇子隔船笑擲買花錢少年豪飲醉忘歸不覺湖船旋旋移水面夜凉銀燭小越娘低唱月生眉紫騮嬌踏落花泥二月江城雨過時拂曉市河春水滿小船多半載吳姬惜春曽向湖船宿酒渴吳姬夜破橙驀聽郎君呼小字轉頭含笑背銀燈待得郎君半醉時笑將紈扇索題詩小紅簾捲春波緑渡水楊花落硯池垂栁隂隂蘇小家滿湖飛燕趂楊花繁華一去風波減今日橫堤幾樹鴉黃清老登岸書所見寄魏亨道紫霞搖日花滿川漁翁不歸鷗在船白雲悠然渡水去平野秋色青連天寄劉鳳溪時有麻源之約不果往南國家人髮欲絲仙壇孤負杏花期多情惟有東橋水流到瓜州月上時留別相尋復相別把酒意如何雲石有時合風湍無定波此行迷出處一笑對嵯峨長揖下山去暮烟浮女蘿夜晏友入席有懷照磨青山林下啼班鳩緑楊門前嘶紫騮落花成陳作春雨東風淡淡雲悠悠美人捲簾日在手蝴蝶飛上珊瑚鈎南溪不見筍成竹擬約滄波同倚樓送王君冕歸陜西狂風卷茅屋遙見溪上山人生有遇合離別何足歎黃鵠將西歸臨水振羽翰我有雙明珠置之青雲端朝朝復暮暮照君千里還訪子威都事不遇清曉抱緑綺來就夫君彈夫君久已出野水流花間石澗渡微雨秋生湖上山松隂坐永日心與雲俱閒人事有離合白鷗聊共還送楊信夫歸臨江自別武夷君海水落幾丈當年尊俎地顛倒疊橫嶂君從山中來應見桃花開秦人笑相語愧我非仙才茫茫八極中雲月秋徘徊苦吟不出户孤負黃金罍劃然西風生拂我琴邊埃願從雙白鶴去去不復回番易舟中聞友人消息因贈岧嶤九天門玉署青瑣闥老我烟霞心參商坐寥闊十年望春雲不忍鑷白髮鴻鴈逺塞來頻頻附書札江湖秋水淺舟楫苦不達不知南山陽梅花為誰發贈汪玉成千里還家獨抱琴象山杳在白雲林曉寒莫厭江東路人倚梅花雪意深自勉東風一笑可人心旋瀝新醅對柏斟山色未勻春意淺梅花已老白雲深半軒依竹閒聽雨千里懷人欲抱琴試問樵溪隔年意碧波東注渺難尋送三山張國寶府掾美歸三山星斗髙貼天三山潮汐走百川張公平生飲中仙襟度脫落神飄然三山神人不敢友天風吹度金鰲巔掃清案牘待明月平鋪緑水栽紅蓮公庭無人山色落時有雙燕歸簾前樵溪夜雨深一尺城外明朝翠如織春歸草木不可遮黯淡已作離別色離別兮奈何若有人兮佩女蘿公不顧兮山之阿滄海渺渺浮雲多友人擬古樂府因題絶句五首采荇歸來午花梢日轉廊緑隂凉似水不用洗紅粧生愛東鄰女蛾眉畫不如近來機杼廢臨得右軍書漫道從軍樂風霜只獨居三年遼水上不得一行書海上扶桑景清光日見君秖愁風雨夜西北有浮雲今夜中秋月含情獨上樓辰星三兩㸃偏照玉簾鈎宋無公莫舞公莫舞公莫舞鴻門王氣歸真主何人睚眦赤龍子手循玉玦目相語令公莫舞公楚舞劒光射日白虹吐人發殺機天不與撞斗帳中笑亞夫霸業明朝棄如土烏夜啼露花洗天天墮水燭光燒雲半空紫西施夜醉芙蓉洲金絲玉簧咽清秋鼙鼓鞭月行春雷洞房花霧酣不回宫中夜夜啼栖烏美人日日歌吳歈吳王國破歌聲絶鬼火青熒生碧血千年壞塜穴狐兔鳥銜紙錢掛枯樹髑髏無語滿眼泥曽見吳王歌舞時烏夜啼啼為誰身前歡樂身後悲空留琴怨傳相思烏夜啼啼別離妾薄命雲母屏琢春氷鮫女織綃蟬翼輕比妾妾薄命比君君薄情紅綿拭鏡照膽明還疑妾貌非傾城傾城從來有人妬况復君心不如故故人心尚峯九疑新妾那能無故時補天天不髙填海海不深不食蓮菂不知妾心寄征衣征衣須早寄遙憶藁砧寒莫訝啼痕少相思淚正乾孫華商人婦妾年將及笄嫁與東家兒東家兒販江西夫婦五年三別離江西娼家花滿蹊不知今年歸不歸春來還為作春衣滿院楊花雙燕飛楓橋夜泊畫船夜泊寒山寺不信江風有客愁二八娥眉雙鳳吹滿天明月按凉州貫雲石君山行北溟魚背幾千里負我大夢遊弱水蓬萊隔眼不盈攀碧落香銷吹不起茜褐女兒懷逺遊逺人不歸明月羞寶叉綰髻翠欲流風鬟十二照暮秋女媧煉石補天手手拙石開露天醜瓊樓玉宇亦人間直指示君君見否斯須魚去夢亦還白雲與我遊君山元藝圃集卷三
