body:
  text: 元藝圃集卷三明李蓘編倪瓚送張伯雨遊張公洞荆溪山水閟靈宫子晉鸞笙下碧峯午夜月明風滿嶂千巖人靜鶴眠松緣知瑶草春來長應有仙人洞口逢莫為青騾翁久住歸來騎取葛陂龍送李徴士過荆溪訪王司丞何處尋狂客故人王子猷花落庭前樹風吹溪上舟紫筍生春雨緑蘋滿芳洲心隨酒船發悵望不能休寄欣笑隱江南隱者人不識一日聲名動九重地濕厭聞天竺雨月明來聽景陽鐘衲衣香暖留春麝石鉢雲寒卧夜龍何日相從陪杖屨秋風江上採芙蓉次韻送柳先生貫東歸賦詩南澗寫烏絲靄靄停雲去後思鄉國動成經歲別江湖復與故人辭溪船斫鱠雲生柁松室聞猿月滿枝他日重尋吾子宅詠歌猶及暮春時春日雲林齊居臨池春流駛掃地夕隂滿正襟味道言超遙坐溪館嵐嶺當書榻煩襟一舒散靡靡松花黃逐逐雲氣暖石梁青苔合於焉人跡斷故非與世疏冥栖遂忘返王永年題墨竹泛泛湘水春依依渭川曲勝地不再逢於焉見叢緑碧幹冒餘烟晴梢媚涼旭恍然碧雲中可玩不可掬人閒白日靜風定層漪渌此君信佳人悟悅何由足楊果洛陽懷古洛陽雲樹鬱崔嵬落日雲深首重回山勢忽從平地起河聲偏到故宫哀五噫擬逐梁鴻去六印休驚季子來惆悵青槐舊時路年年無數野棠開李京留別成都諸公蒼龍雙闕鬱岧嶤曽侍鵷鸞趂早朝往事已隨塵滚滚虛名贏得鬢蕭蕭長林豐草空相憶瘴雨蠻煙若見招借問都門門外栁為誰留著最長條李源道燕中懷古荆卿墓上草離離郭隗臺邊對落暉戰國山川秋氣壯中原豪傑晚星稀乾坤納納無人識南北年年有雁飛說似蘆溝橋畔栁安排青眼送將歸馬易之宿赤城館休駕赤城館憑軒望前山飛雨西北來亂灑石壁間風寒樹凄凄木落沙班班牛羊盡歸村微燈掩松關野老頗留客及此農事閒傾筐出山果濁酒聊慰顔移尊對金閣靈宫鬱孱顔安得吹簫人乘鸞月中還劉汶贈劉禹玉劉郎方朔徒游戲紫泥海千年華表非惟有寸心在向來浙水西雄辨吞虹霓手携九節杖東入蓬萊棲我時探禹穴同看山隂雪千人萬人中怪子獨超越朝騎白鼻騧暮逐油壁車得錢即付酒携妓顔如花踏翻豪俠窟醉狎山人家或嘲狂處士或誚報恩子從渠立名多詎識子竒偉一朝去鄉國北上爭吹噓家無十金産袖有萬言書所陳果何事為國非自計寧遭丞相嗔肯負丈夫志蹉跎十數秋甘與黃冠儔善藏倚天劍未暇摩斗牛幡然走山東隱跡隨壺公還尋岱宗去絶壑凌天風雞鳴上日觀眼亂扶桑紅窺臨事未巳逸氣橫萬里行歌齊魯間興為廬山起廬山秀可餐怡此氷雪顔揮毫灑瀑布五老開雲關逺公拍手笑喜見遺民還乃知士不偶正可遊名山去年卧衡嶽聊憩四海腳猒垂君平簾懶賣伯休藥却呼魏夫人共把流霞酌今年與山辭下走湘水湄臨風弔賈傅酹月招湘纍文章本疏蕩强忍終技癢光怪不可收倐忽又千丈有時遇知音朗咏山中吟復恐兒輩覺不得容山林兹辰忽聚首慰我別來久辛勤四十霜所獲竟何有却懷居東時勇以功名期焉知尚漂泊筋力供路岐舉杯置往念此去安所之南窺古雲陽更了山川竒山川固娛目慎勿過幽獨奈何白雲歌再送劉十六乾坤眇蒼茫回首眷空谷我將秣其駒乃不受羈束願子無遐心歸哉返初服彭炳明簪明簪倚修筠撫攬自清絶明河夜無聲茅亭四檐月露寒鶴夢醒山花落香雪白雲雖無心今宵倘怡悅持杯欲問之忘言楚天碧渺然思美人芙蓉似顔色乘鸞月明中青霞擁鸞翼苒苒別離時吹簫苦幽咽楚山楚山琢青玉斗酒浮漢江叩舷歌明月慷慨過楚邦亡國非所恤鹿門思老龎此心出萬物富貴焉可降卧龍拜床下髙風古無雙懷彥肅二年不見瓊花樹修竹長松獨倚樓一片白雲東海上又隨春雨過揚州絶句坦坦黃金道蛾眉坐瑶車莫隨雙燕子容易落人家李冶瀟湘夜雨逺寺孤舟墮渺茫雨聲一夜滿瀟湘黃陵渡口風波暗多少征人說故鄉李昶寄王總管華陽東下古梁州五馬旌旗擁上游腸斷寒江衣帶水令人空望鎮南樓過故縣埧憲宗皇帝射臺髙氣壓蠻江萬丈濤玉輦不歸岩樹冷白雲何處醉蟠桃張惟中月梅南屏山下一枝開西子湖頭幾度來惆悵無人重放鶴酒船空棹月明回丁守忠贈𤣥莫錬師神仙中人毛外史方瞳深碧虬髯紫了知大道本無為况是谷神元不死偶因救旱驅𤣥溟倒㵼銀漢如建瓴功成不居拂衣去洞庭渺渺君山青張昱壽光宫訪道士不遇留題髙阜臨大溪激流喧衆石中藏壽光宫年深翳金碧儼然天人尊羽衛何赫奕回廊䕃古木苔蘚少行跡傳昔丹霞士於斯錬金液徘徊長松下瞻望雲氣白不見種桃人惆悵理還策周馳懷郭安道江南江北路茫茫明月髙樓各異鄉旅雁叫雲天似水故人今夜泊瀟湘和郭安道韻西風吹起白頭波半夜扁舟掠岸過不向長橋酤一醉滿天明月奈秋何雜興凉氣潜侵玉女窗井梧一葉下銀床離情有似東流水一夜相思歸夢長楊栁青青麥吐芽壺觴來就野人家可憐廢井荒畦畔狼藉東風一徑花巴延子中春日幾片殘紅㸃客衣小溪流水鱖魚肥畫橋盡日無人過楊柳青青燕子飛姚燧輿病髙崖道中作役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦瘧鬼偏凌客山英定笑人無勞問前渡秖覺白頭新舟達黃溪草木隨寒暑殊方榮悴同葦華兼露白柳葉未霜紅日月雙飛鳥江湖一病翁晚來沙嶼上愁坐獨書空李繼本寄思溫尹長松過雨碧蕭森凉籟吹香滿素襟泉落空潭秋灑灑雲生虛室晝隂隂塵埃書劍千山路風雨江湖萬里心客散衡門更清絶月明誰聽紫瓊琴陳孚鄂渚晚眺黃鶴樓前木葉黃白雲飛盡岸茫茫櫓聲搖月歸巫峽燈影隨潮過漢陽庾令有塵汙簡冊禰衡無土蓋文章䦨干只有當年柳留與行人記武昌交趾使還少年偶此請長纓命落南州一羽輕萬里上林無雁到三更函谷有雞鳴金戈影裏丹心苦銅鼓聲中白髮生已喜歸來身健在夢回猶覺瘴魂驚燕山除夕簡唐張二文友萬井笙歌徹曉聞千官待漏夜紛紛奴星有柳祠窮鬼臣朔無柑遺細君長樂鐘聲敲碧漢廣寒簾影捲紅雲自知報國無他技賴有詩書可策勳出門別親友停君漢水浮鴨之翠杓聽我嶧山栖鸞之緑桐男兒拂衣出門去龍泉三尺光如虹君不見磻溪鶴髮釣魚者偶擲漁竿來牧野白旄麾開炮烙烟桓圭朱芾侯青社又不見南陽卧龍人不識一朝佐漢坐狼石羽扇輕搖蛇鳥驚火精焰焰天西極旗亭四月柳如藍紫騮嘶風黃金驂豈無叩牛歌亦有捫虱談天生巉岩崒嵂骨蒿萊槁死誰能甘我欲登泰山扶笻欵天關東溟弱水如可攀手弄白日青雲間我欲渡黃河赤腳凌秋波水仙樓閣髙嵯峨徑叱海若笞蛟鼉銅雀臺古臺百尺生野蒿昔誰築此當涂髙上有三千金步搖滿陵松柏圍鳳綃西飛燕子東伯勞塵間泉下路迢迢龍帳銀箏紫檀槽怨入漳河翻夜濤人生過眼草上露白骨何由見歌舞獨不念漢家長陵一抔土玉匣珠襦鎖秋雨吳宫子夜歌紫貝樓闕鬱金香暖雲七十紅鴛鴦玉蟾笑擁霞綃裳星河不墮宫漏長緑樽灧灧麟髓泣露重花寒秋不濕歈歌一聲起雪濤海龍夾陛如人立誰知淺顰蛾半掃中有踈螢滿秋沼越兵曉踏西風來碧波一夜芙蓉老太液秋風一鏡拭開秋萬頃碧天倒浸琉璃影寒飈夜捲雪波去貝闕珠宫黛光冷三千歌棹搖緑烟濕鬟吹墮黃金蟬琪樹颼颼紅鯉躍衮龍正宴瑶池仙瓊花春隂一峯亭亭湧寒玉露花不墜瑶草緑珠樓千尺漢星間天風吹下笙韶曲萬年枝上槲葉滿小鸞倀倀繞龍管金根曉御翠華來三十六宫碧雲暖居庸疊翠斷崖萬仭如削鐵鳥飛不渡蒼石裂嵯岈枯木無碧柯六月太隂飛急雪寒沙茫茫出關道駱駝夜吼黃雲老征雁一聲起長空風吹草低山月小西山晴雪凍雀無聲庭檜響氷花灑簷大如掌平明起視岩壑間插天瓊瑶一千丈夕陽微漏光嵯峨倚欄更覺爽氣多雲間落葉有徑否想見樵叟猶青蓑玉泉垂虹雪波碧擁千崖髙落花㸃㸃浮寒瑶日斜忽有五彩氣飛上太空橫作橋古寺殘鐘答鈴語回首前村猶急雨輕綃欲翦一幅秋又逐西風過南浦薊門飛雨黑雲如鴉漲川谷雲湧電躍風折木半天萬㸃捲海來森森映地如銀竹鳳城無數笙歌樓珠簾半捲西山秋誰知羈客家萬里一燈正擁寒衾愁湖上感舊西日朱樓擁翠鈿女牆猶在草芊芊東風第六橋邊柳不見黃鸝見杜鵑李溉之我本山人素志邱壑獲歸名山為願畢矣爰以四月十一日離京師是夜抵潞陽慨然賦詩還慰匡廬隱者并以寄金門諸公為一噱云野馬脫羈鞅倐疑天地寬臨風一長鳴風吹散入青冥間頗如魯仲連到海不復還又如安期生長留一舄令人看江南浩蕩忽如海落日照耀浮雲關既不能低眉伏氣摧心顔詭遇特達驚冥頑又不能抱書挾策干萬乘調笑日月相回盤匡廬迢迢接仙山仙翁泛若秋雲閒長松之隂引孤鶴望我不見空長歎采鉛天池津飲渌桃花灣蒼梧倒影三湘寒赤城霞氣生微瀾鯨鯢翻空海波赤曉色欲上扶桑難人間之樂兮誠不足恃何如歸卧棲岩巒棲岩巒卧岩穴夜半天風吹酒醒猶有西溪萬年月題漢陽郎官湖山翁薄暮醉酒歸杖藜迷却髙陽池清風吹花緑隂倒我笑謂是秋雲移還乘貫月槎夜過郎官湖崢嶸星斗如江漢蕩漾槎影如鯨魚九華之真人邀我倒玉壺麒麟擘脯供行厨依稀仙樂在空際碧山西映寒蟾孤舉酒酌寒蟾明月下飲姮娥居霓裳拂雲錦萬荷露㵼瓊瑶珠麾幢暗靄羅烟空乃有玉皇所授之玉童風前飄飄曳廣帶對立十二秋芙蓉清香九曲銀河通真人緑髮披春風錦袍玉雪照天地口說姓字安南公是公多逸氣略與古昔賢豪同時能掃月色延我石室烟蘿中又言昔同張謂所遊地長嘯一覆丹霞鐘風吹仙樂度溪去我已醉卧香爐峯沈原禮題蘇小小墓歌聲引回波舞衣散秋影斷夢别青樓千秋香骨冷青銅鏡破霓飛鸞飢烏弔月啼鉤欄風吹碧火火不滅山妖哭入狐狸穴西陵墓下錢塘潮潮來潮去夕復朝墓前楊柳不堪折春風自綰同心結劉致淮南歌甓社湖中出明月斯須千山萬山白燭龍馳影不敢眠淮土風烟黯無色鼪鼯起啼鰍鱔舞荷風驚濤戰南浦湖天無光湖水立夜半行空灑飛雨東方搖搖天欲曙畢逋啼老扶桑樹淮天幽幽淡空素老蚌潜輝寂無處望夫磯望夫山頭日欲頽望夫山下江聲哀山頭日日風雨惡江上不見行人回空山亭亭幾朝暮猶記行人去時路知君渡河長不歸恨不當年逐君去此身化石千仭磯石猶可懸心不移長江水涸黃埃飛行人應有歸來時秋雨吟濕螢閃光飛不起八尺風漪夜如水仙姝不眠肌骨清起馳夜凉吹玉笙曲中忽作孤鳳鳴天地感泣秋雨零旱龍渴死嗟不及坐見扶桑落葉濕前溪水髙龍夜吟不管西郊老農泣李鵬三尺水劍歌龍侯手提三尺水清晨訪我古獄裏直愁雲氣感星辰滿目寒光素濤起𤣥氷凝結搖空青芙蓉白日生精熒為君拂拭開寶匣炯若積雪涵疏星起看天地雲冥冥誰其麾叱走六丁為擊風雨驅雷霆蕩滌氛祲萬國寧上頭銘字侯所作辭嚴義正發炳靈憐君少年負才氣每能仗義討不廷側身北望空馳情君不見燕丹夙夕得荆軻尊前擊筑揚悲歌咸陽西入萬狼虎白虹貫日橫秋河英雄事去一朝異奈此古來憂憤多憂憤多向誰語我有髙懷亘千古黃金不用買功名失勢因之虎為鼠嗚呼腰間寶劍棄如土為爾更歌公莫舞鬼首法刀歌犴狴雲黑風怒號古柏下䕃青天髙白頭獄卒氣如虎示我鬼首之法刀刀光閃閃展秋練朱髮蒼髯颯青面𤣥冥使者為護持一夕蟠空起雷電雷公霹靂電火微恨血漠漠青燐飛妖狐跳梁天狗吠北斗白日無晶輝君不見東南羣盜方馳突黃牛峽西更倉卒酒酣激烈風火生我欲持刀待