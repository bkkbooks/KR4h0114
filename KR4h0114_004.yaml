body:
  text: 元藝圃集卷四明李蓘編楊鵬翼頴亭懸崖髙築此亭孤落日登臨酒十壺雲破九山開疊嶂天低三楚入平蕪斷碑黃絹空塵迹逺水白鷗如畫圖對此風煙已蕭灑扁舟何必到西湖送真善卿歸秦中少年錦帶佩吳鈎曾伴秦陵俠士逰沙苑草青春試馬嶽蓮雲淨晚登樓十年為客少青眼一事不成空白頭此去何時重相見一樽聊與故人留陳茂卿花石行鉷聲一發千鵰舞汴水黎童泣􅎏鼓千年廢圃墮空荒蒼壁化為圊下土江南壯士鐵衣寒落日驅車望靈武瑶官飛墮黑山顛淚灑江花作紅雨天南羈鳥歸不歸故園草荒陵樹稀趙茂原曉寒曲曲欄亷纖杏花雨博山煙飛裊晴縷夢回金帳春融融鸚鵡驚寒隔窗語美人曉粧雲滿梳栁風吹香入氍毹翠鬟嫋嫋綰不斷寶叉壓鬢紅珊瑚丫鬟捲簾採桃葉驚起一雙黃蛺蝶秋霄吟平林薄暮風淅瀝黃金滿地秋狼藉新月出嶺光欲流萬籟無聲夜寥閴誰家美人吹鳳簫彩鸞對舞摩青霄䦨干縹眇碧雲逺天風入骨涼蕭蕭銅壺水寒銀箭澀玉露滴空衣袂濕缸花落盡爐煙收幽懷耿耿生新愁寒螿啼碎人間秋成廷圭述懷讀書不干萬乘君挾䇿豈傍諸侯門千金未易買駿骨一飯何足哀王孫放歌蘇臺暮山碧濯足大湖秋水渾風塵拂袖且歸去髙卧武陵烟水村清泉寺何人泉上記春遊茶具橫陳晚未收木葉盡隨風掃去萬山青立寺門秋閏正月草日聞泗洲盱眙同失守野塞蒼茫落照中東征三載未成功黃金似土供兒戲白骨如山泣鬼雄天狗星沉軍府動水犀軍散弩臺空于今人力消磨盡誰念東南府庫窮同張仲舉夜宿寒橋柔櫓聲乾破寂寥青山磯下宿寒橋乾坤萬事雙蓬鬢風雨孤舟半夜潮丹鳳不來秋又老玉人何處水空遙幾時重醉秦淮酒細聽漁樵話六朝曉出錢塘門出城聊適意草樹碧紛紛一雨破清曉四山生白雲僧樓緣嶺出樵徑過橋分明日重㩦酒來澆和靖墳薛宗海鄭應奉雜詩當年東山翁笑傲聊永日弓旌一朝下萬里赴星驛回頭故舊友十見秋柏實峨峨東觀中大書黑如漆想見日暮歸沙輕馬蹄疾淳風散已久青黃陋窪樽婉孌爭媚好役智空自昏豈知葛天民無言道彌敦我有白雲操泠泠寄桐孫調古識者寡幽探萬化源驅車涉逺道日晏不知疲一見嵩華髙始覺岑樓卑吾道麗天壤昭昭匪難知千金買刀圭但為方士欺贏糧往問道去結汗漫期志士方盛時危冠怒衝髮猛心石為開壯氣山可拔安知橫江鯨中路螻蟻狎所以巢居子商歌竟不輟歌竟寂無言坐聽天籟發夜歸有客有客胡未歸長安三見秋葉飛警霜老鶴夜不寐弔月孤鴈寒無依紛紛北里厭梁肉落落西山甘蕨薇人生窮達各有命何須終夜泣牛衣程煜過太湖擊楫中流去西風客思催地吞南極盡波撼北溟回蛟館懸秋月龍宫起夜雷濯纓人不見長嘯倒金罍韓中村嶽王墓妖星墮地芒角赤龍劍悲吼風蕭瑟中原王氣挽不回將軍一死鴻光擲秦家小兒真戲劇播弄造化搖樞極指讐為親忠且逆隻手上遮天眼力九關茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶憤激古墳埋寃血空碧風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斫出荒苔痕獻作吾皇補天石陳小庭大孤山至湖口大孤大孤何渺茫小孤誰說嫁彭郎鞋山對面四十里屹立宛在湖中央行轉清江過湖口波濤如此今何有天公助我半帆風江神勸汝一杯酒楊信可奉别存初郎中臨湘月下泛舟天風吹老白蘋洲天上朗星月下逰過鴈影沉湘水碧斷猿聲入楚山秋歌翻白紵猗蘭泣夢落黃陵帝子愁夜半鍾聲天曉角猶疑身在鳳池頭望池州作黃蘆瑟瑟草油油樓閣參差瞰碧流萬里長江秋色逺一帆斜月過池州遊子敬次吳博士道人韻行色春將暮江流日復深艱危今古恨飄泊嵗時心江燕時相語山猿夜獨吟客愁渾未減雲樹晚沉沉答吳彥真見訪茅屋秋江上畦蔬亂水中鴟猿號暮雨粳稻熟秋風好客詩能寄貧家酒不空干戈與衰謝此日意無窮答劉巨川殺氣騰邊郡風雲㑹禁闈艱難雙鬢改牢落寸心違暮雨悲笳急秋空過鴈稀故人將避世何事總戎幾秋興野曠天髙露氣浮月明烟冷水空流愁連鼓角雙蓬鬢秋滿江湖一釣舟緑酒難逢陶令醉蒼生無復謝公憂百年世事塵埃裏默默含情獨倚樓蘇大年長橋緑隂髙樹映清潭一舸夷猶酒半酣最愛西城城下路長橋烟雨似江南江城即事江城十日九風雨騎馬出門行紫苔春草緑時長作客雲山多處忽登臺青青野竹題詩去小小吳姬喚酒來漠漠候車乘早發城東昨夜杏花開送李盤中真人代祀江南三名山弱水回風不受帆三山只在大江南使槎直帶秋星濕仙掌遙分夕露甘瑄玉禮神通景氣寶香隨地結晴嵐泰壇建論昭靈貺老我猶能效史談送趙子期使交趾曉日承恩柴殿深都門祖道馬駸駸上書不奏唐䝉䇿歸槖寧將陸賈金露入珠盤鮫室白雲生銅柱象崕隂為君臨水歌黃鵠天北天南萬里心余闕白馬誰家子白馬誰家子緑轡縵胡纓腰間雙寶劒璀璨雪花明甫出金華省還過五鳳城君王賜顔色七寶奉威聲夜入瓊樓飲金鐏滿繡楹燕姬陳屢舞楚女奏鳴筝慷慨顧賔從英風四座生一朝富貴盡不如秋草榮黔婁固貧賤千載有餘名吕公亭鄂渚江漢㑹兹亭宅其幽我來窺石鏡兼得眺芳洲逺岫雲中沒春江雨外流何如乘白鶴吹笛過南樓龍丘長吟贈程子正戰龍起新室羣鳥亦翩翩偉哉龍丘生抱琴歸故山仰視天際鴻俯弄席上弦清音發疏越逸響遺澗泉悠悠鳳翔漢婉婉虬媚川清風自千古何用能草𤣥題黃河清良岑幽居大明照四海之子乃陸沉逺絶仁義絆結宇幽藪隂薈翳谷中路嶄崱北山岑窗鶯響初䕃隴月頽夕林時憑曲水几蕭散發長吟委化諒為達滯樂恐遂淫援琴鼓招隱念子為薰心安慶郡庠後亭宴董僉事鯨鯢起襄漢郡邑盡燒殘此城獨完好使者一開顔省風降文囿弭節遵曲干雙池夾行徑纍榭在雲間天淨羣峰出地逈滄江環霞生射蛟臺鴈沒逢龍山開樽華堂上命酌俯危闌主人送瑶爵但云嘉㑹難豈為杯酒歡樂此罷民安魄淵無恆彩清川有急瀾明晨起驂服相望阻重關賦得蛾眉亭送王德常御史赴南臺江亭望華崿望望似修眉掃黛偏能巧含顰知為誰娟娟微雨裏脈脈夕陽時千里乘驄去因之傷别離陳旅南山江左羣山囿仙丘倚太霞上清分亢爽南谷抱谽谺臺觀黃瓊宅林巒赤斧家天池開寶鑑日井射金沙桂霣秋岩粟桃烘曉岸葩泉香通美竹雲液漱靈芽俯澗松偏潤緣崖徑自斜幽亭宜水繞晴閣受嵐遮神舄丹扄祕關門紫氣賖石橋留月色銀浦渺星華願解延陵劍終乘博望槎臨風一邂逅食我棗如瓜送彭大年真人祀東海東嶽東鎮國典崇常祀名山仰岱宗聖皇欽所遣使者肅惟恭禮自唐虞秩神知造化鍾天門開􅏭嶫日觀上巃嵸零雨行清道浮雲起蕩胸宿齊分鶴帳朝享發鯨鍾吹溢安歌進靈來衛仗從御香分暗靄佩玉響瑽瑢美薦懷椒糈精誠奠壁琮東流瞻巨海列鎮到諸峰瀛島遙相望仙人或此逢嶽祇調虎豹水怪帖魚龍星墜祠光白烟涵瑞氣濃振衣臨濬壑飛蓋拂長松庶物消餘沴洪河復故蹤年祥報齊魯地寶出雷雍嘉澤羣方洽明時百職供回車宜訪問弭節可從容世祚祈干億𤣥功贊九重禁庭歸福處有待頌東封辛好禮贈仙壇胡尊師一鶴晚隨青玉杖雙龍秋佩紫荷衣月明何處聞吹笛百丈山前賣藥歸登梅山觀蓬萊縹眇青山上海客初晴駐錦袍萬竹蛟龍森窟宅中天樓閣擁波濤清秋近見銀河落入夜平看北斗髙銷盡半生塵土夢玉笙此處醉金桃贈道者方丘生龍翔鳳翥丹臺字曾向神清挹紫霞每共野人聨石鼎更從勾漏問丹砂金精月落逢騎虎銀漢秋髙欲上槎惜别臨風一揮手他年應寄棗如瓜宿龍鳥寺髙人久矣念離羣來向山中禮白雲龍送雨過留客住鹿銜花至與僧分疏星出竹昏時見流水鳴渠靜夜聞却憶故人江海上題詩誰似鮑參軍宿洞陽觀洞陽觀裏看明月雲霧軒窗挂六鰲五月蛟龍吹海上四更星斗去人髙山隂羽客黃庭字太白神仙宫錦袍遙望長空意無限九霄何處醉仙桃定子靜經過太平宫舊址開元皇帝太平宫棨㦸重臨玉殿空龍虎氣收仙井上風雷隂護石幢中秋清雪瀑千尋落雲際天梯九疊通安得香爐峰色裏更看飛觀紫冥濛王繼學和馬伯庸寄袁士白雪賡歌少朱絃咏嘆長天池鵾獨運霧谷豹深藏舊地收華㦸新田買石房閒情齊綺皓時論佇班揚瑚璉登周廟宗彛畫舜裳西昆分皓氣南斗避寒芒六月灤陽扇三秋鏡水航彈琴無俗曲辟榖有仙方玉海羞麟脯金莖饋露漿書空忘咄咄文障擁堂堂翰府聨芳逺樞庭奕乘光名山留史䇿上國售詩章節擬芝田鶴音諧律管凰寫經酬道士立塔禮空王籍草連裾碧分觥注酒黃竹床吟几小紗幘鬢絲涼離别三生夢歸依一瓣香升堂乖笑語在野愧才良雲擁鄞山雨潮生定海洋何時宣室召駟馬驟康莊虞祕監山林小像棧閣通秦鳳蓬山壓海鰲石泉當壑折琪樹出雲髙夜月青笻杖秋風白道袍長吟趍谷口獨往下亭皋偃蹇三峰卧逍遙八表遨竹深時宿鶴溪淺不容舠經席天顔喜村居世網逃神全勞畫史才美擅時髦憩迹推松樾充飢有澗毛滄浪誰唱曲華屋意蕭騷題扇橫波清淺露平洲沙暖鴛鴦得意遊一夜西風吹雨過有人獨上木蘭舟銀河秋早露華新碧樹雲收月半輪庭外西風聞鴈過畫樓應有斷腸人送王在中代祀秦蜀山川太華雲連蜀棧低栁花三月紫騮嘶香浮曉露金奩濕幡拂春烟絳節齊䇿牘當年登桂苑詞林後夜趍芝泥長安逰客應無數誰共王褒頌碧雞題鮮于伯幾與仇亷訪帖三生文采趙公子四海聲名仇使君彈琴不作廣陵散焚香遙駐博山雲玉樹春來鶯謾語繡衣人去鴈空聞龍蛇兩紙真如玉即是安西與右軍上京次伯庸學士韻侍臣催講御階西雲靜觚稜曉色低天闢神州卑兩漢地連碣石轉三齊含香晝永閒青鎖視草堂幽濕紫泥最憶東山老松樹秋風應有鶴來棲髙克恭即事古木隂中生白烟忽從石上見流泉閒隨屈曲尋源去直到人家竹塢邊王景初南湖道中漠漠烟中小艇回芙蓉花外有軒臺平湖一日三千頃髙卧南風看雨來鄧德良中秋憶家千里星河一鏡圓杜陵兒女隔秋烟遙憐此夕柴門裏相對青樽說去年潘純題趙子固書蘭江上青山日欲晡幽花小紙墨糢糊華清宫殿生秋草零落滕王蛺蝶圖嶽王墓湖水春來自緑波空林人跡少經過夜寒石馬嘶風雨日落山精泣薜蘿江左長城真自壞鄴中明鏡為誰歌空餘滿地萇𢎞血芳草年深碧更多海門寒日淡無輝偃月堂深晝漏遲萬竈貔貅江上老兩宫環珮夢中歸內園羯鼓催花發小殿珠簾看雪飛不道帳前胡旋舞有人行酒著青衣王尚志同鎮陽李先輩登臨川擬峴臺楚塞蕭條客復來已無秋渚藕花開西風曠野孤城出落日西江白浪回山似襄陽非故國地連吳㑹有髙臺南歸萬里頻回首潦倒徒傷賈傅才楊叔倫送季上人歸金華山南村十月花草稀白鷗半兼鴻鴈飛夕陽在野雨初散秋葉滿林僧獨歸空中聽法花委地海上洗鉢雲生衣去來飄忽無定迹回首青山深翠微黃君瑞暮春雜咏寄友人緑漪池沼燕交飛深院重門客到稀栁絮不如春去盡尚隨風起㸃人衣翁德元題柯敬仲墨竹湘江何處弔湘妃極目愁雲是九疑欲寄所思秋水隔鳳簫吹徹玉參差馮淵如墨梅一枝竹外夢春酣零落綃裳舞翠嵐天淡水平山月小有人吹笛過江南葉衡上京雜詠玉階天近露華流夜久涼風入鳳樓曾把翠雲裘進否上京六月冷於秋夜宿榆林月滿天青帘紅燭喚􅘑船相逢莫問兒家姓醉裏空留白玉鞭丁鶴年題蕪湖辛順中西圃卷坐閲桑田變歸為菽水謀聊從西圃隱少慰北堂