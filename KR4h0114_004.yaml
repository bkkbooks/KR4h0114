山歸棹圖西風吹鴈楚天長兩岸青山木葉黃絶似洞庭湖上見一帆秋色過衡陽春江白鷺圖贈方仲溫時遇金陵歌别秦淮折栁枝蘼蕪春水緑生漪閒心一片滄浪月只許沙頭白鷺知同朝天宫道士朝回口號午隂初轉御橋灣齊退從容出九關天上好風重送喜鑾輿明日幸鍾山西湖絶句芙蓉灣口緑隂斜吹笛何人隔彩霞驚起沙頭雙翠羽銜魚飛上刺桐花流觴亭子鳳山阿都護行春小隊過笑擲金錢花下醉玉箏彈出白翎歌寶網金幢變劫灰瞿曇寺裏盡蒿萊鳥巢無樹山䕫泣不見談禪太傅來西陵橋下水生烟屬玉飛來近釣船荒盡梅花三百樹孤山何處訪逋仙戴表元湖上贈歌者牡丹紅紫艷陽天檀板朱絲錦瑟箋頭白江南一尊酒無人知是李龜年聶古柏過采石采石江頭秋月白蛾眉亭下灘聲咽繡衣玉斧曉霜寒同是天涯苦行客酒仙一去海生塵青山三尺理衣巾清江白鳥自今古岸草汀花秋復春我欲御風逰八表醉裏髙情覔三島閶闔雲深不可攀回首江南數峰小黃子嬴候張伯陽州判不至奉寄海風吹散樵山雪灑向瑶臺照明月因之欲訪三蓬萊望斷雙鸞翠烟滅且持寶劒窮南溟片帆飛度遙山青幽尋丹碧采芝草松風竹露春泠泠江邊忽遇蟾宫客江草江花盡相識東風一笑訪驂鸞三十六峰總春色峰顛孤鶴飛且鳴徘徊似欲難為情雲深林暝杳莫辨時時照影臨溪清我時感此生幽趣笑折瑶華寄仙子白鶴飛去猶未來門掩青山正風雨夏􅷆題杞上人所藏小畫太隂慘淡雷雨泣懸崖老樹蒼蛟立亂山鱗鬛雲氣寒石火迸出金流汁君不見老禪好畫如好色尺寸須酬萬金直何如天台看蒼石林公慶賦明月樓贈孫伯融兩溪合流涵太虛白龍簸弄摩尼珠玉娥捧盤不敢去孚尹教入仙人居仙人乘雲逰汗漫瓊簫寥寥度銀漢斟酌北斗依上台玉宇珠宫露如霰鳳臺神馭不可留春風花開帝王州芙蓉峰前舊時月夜夜長照溪上樓李孟昭西湖夜宿蹇驢衝雪岸烏紗夜醉西湖賣酒家十六吳姬吹鳳管捲簾燒竹看梅花陳雍葛嶺懷古山上樓臺湖上船平章醉酒懶朝天羽書莫報樊城急新得蛾眉正少年俞行之西湖西湖湖上可憐春烟栁風花最惱人羅袖泪乾無好思畫船歌舞為誰新秋來碧水湛平湖荷葉菱花取次枯唯有斷堤楊栁樹淡烟猶鎖亂啼烏陸孟昭初夏逰西湖諸山山寺迢迢湖水東樓臺髙處翠微中自慚投社非陶令却羡能詩有逺公花氣暖浮千嶂雨松聲涼灑一䦨風穿林怪底多麋鹿十里平坡碧草豐白珽湖居雜興御舟初出賞春菲傳是諸王與后妃香霧漸深簾幕暗日斜惟見淡黃衣脈脈吹香屋角梅北風移燭小簾開鳳城幾日元宵近一片簫聲水上來相國平泉水竹居吳中花石世間無逰人馬上休回首一半春風在裏湖雨後林塘夏亦秋一葫蘆酒在船頭醉來深入荷花去卧看青天飛白鷗郭奎紀夢忽忽頽芳年搖搖寄行役寢興勞形神鬢髮𤣥已白驚風響庭樹憂思日常積夢魂清夜歸倣佛舊鄉邑青松在園田桑柘䕃廬室飛鳥雲際還牛羊下來夕澄湖淡微波秋山有佳色雞犬雜比鄰墟烟靄阡陌怡怡兄弟情凄凄丘隴側伐木逢行歌僕夫候馬立臨流濯長纓挂冠坐盤石似慰平生歡覺來異疇昔百年如轉蓬萬物乃遺舄天命良在兹勿復云得失春日行春風爾來何無情忽然吹我華髮生淮南三月花滿城金尊海錯羅雕楹美人對坐彈鳴筝酒酣起奏升天行當年歡樂不復得白日為照心未平心未平發長嘯我曹豈是閭閻兒齊東魯連頗同調新豐市過新豐待沽酒雪花當空大如手斷橋荒店無人烟獨有寒梅伴踈栁憶昔江東未搆兵我亦曾經此地行東家槌牛出新釀西家開宴還吹笙春風步障千花錦當壚美人勸客飲形勢雖非漢祖為倣佛咸陽舊陵寢停驂慷慨懷馬周我欲濯髮臨清流斗酒不可得髙興良難酬著鞭遙指敬亭路孤雲日暮心悠悠送孫良玉還同安送君江上去山路雨初晴落日平淮樹春潮帶皖城酒因今日醉人是故鄉情莫說王孫怨芳洲緑草生嵗暮寒月出在户江春鴈獨飛愁人不能寐鄉淚忽沾衣丘壠十年别星霜兩鬢稀為言叢桂老嵗莫淡忘歸郡齊秋日次韻幕府簡書靜一官清自閒秋聲在東壁爽氣滿西山叢菊可延夀芳尊聊解顔當軒兩嘉樹好鳥暮知還與黃本和同舟宜春臺下瀨輕棹疾如帆人物同黃憲風流似阮咸寒花猶覆石飛翠忽沾衫出峽頻回首蒼茫日半銜人日新年人日至殊覺客愁多故國音書杳南天物氣和城春偏雨雪江暝足風波無限扁舟意吾將詠棹歌留水西寺貽季潭上人上方禪寂地瀟灑似天宫誰刻蓮花漏因知晉逺公雲衣留卧內松拂掛溪東已悟浮生理吾將杖錫同潭影淡禪心髙窗雲更深偶陪林下賞兼聽丘中琴清梵間隂壑香厨下午禽客懷倦炎暑賴此泄煩襟過富州贈權柏文章江寒夜泛舟初岸曲沙平月色虛兵氣未銷吳楚分劒光猶射斗牛墟明公偶國專封拜使者交鄰奉簡書為喜豐城知己在别來懷抱定何如送吳師程山長還宣城君歸鄉國我淹留寶劍長歌不盡愁此日髙城尋第宅故家喬木在林丘將軍豈識千金子丞相曾封萬户侯别後相思重回首白雲飛散敬亭秋贈白紵山庵道人楊𤣥中四望亭前姑孰溪道人種玉住山西古松數株秋滿屋青鳥月明時一啼僧西齊和九日閒居閒居愛重九使我念陶生但取杯中物不貪身後名季秋霜始降向晚月初明草際亂蟲語林稍殘葉聲踈籬采叢菊小嚼扶衰齡美酒既滿樽一吟還一傾田園自可樂圭衮何足榮貴賤各有志好惡吾無情所以君子懷悠悠嵗功成居秦川正月初追念疇昔和逰斜川詩日月更出入何時得畨休古人厭長夜常欲秉燭逰散亂北歸翼蒼茫東逰流輕颵拂海霧逺景分沙鷗適野見樵漁杖藜赴林丘羣松何錯落乃與雜蔓儔譬彼丈夫雄兒女互相酬却立冰雪間爾曹無愧不陽春降德澤草木解隂憂但事食與眠其他非我求廣戍阻風和庚子嵗五月中從都還阻風桂林自古嘆行役我今始知之山川一何曠巽坎難與期崩浪聒天響長風無息時久逰戀所生如何淹在兹靜念園林好人間良可辭當年誰有幾縱心復何疑歐陽𤣥漫題鈴索無聲玉漏稀青綾夜直月侵扉五更一覺梅花夢催得江南學士歸吳西村雪霽圖鄭䖍能畫又能詩獨立經營雪霽時曾向湘江拿釣艇賣鮮沽酒髮如絲雜詠鰲山晏罷月溶溶太液池邊湛露濃不用金蓮送歸院水晶宫出玉芙蓉永清寺白巖上人燕坐白巖阿巖上皚皚白石多曾到補陀南海岸白花無數擁盤陀白巖山下俯清池花有清香水有漪幾度收經看月上分明水底見摩尼逢江易藝芳干賦芳洲楊栁垂垂拂釣磯平沙雨過緑生衣王孫鬭草歸來晚撲漉鴛鴦帶水飛東山春景春光淡淡日遲遲正是名園撲蝶時却憶小橋流水過東山春色在桃枝許有壬神山田塍晚獨䇿及此時雨晴東畦與西疃泱泱流水聲豐年已足歡清風復多情歸來藉草坐濁酒還自傾不用澆磈磊我懷無不平落日照我影頎然溪水中涼飈動絺衣勢欲淩虛空顧之一大笑與爾將無同昔也爾何達兹焉爾何窮莫道山林陋乃有黃虞風靜念少日事躁中劇揠苗欲令千載淳反之在一朝斥鷃不自量上欲搏扶搖世怒任盲俗林譏愧清謡傲骨日已長及辰事逍遙淵明昔歸休開嵗才五十我雖年近似我道慙什百兼金與尺璧敢取儕瓦礫緬焉動真想迅往孰誘掖庶幾歸田園千載可同迹中書久病得請將歸吳間間大宗師亦有疾以其象為贈云代彼陪行焚香對之作此以謝鄙人本是山澤臞涉世政坐飢寒驅五年黃閣事何補種作老病叢孱軀灤京歸來十浹日藥裹不可離須臾平生結客半寰宇未免操瑟從齊竽可人底事期不來承慶堂深誰敢呼邇來亦復詩作祟清減益見風標孤杜門却掃難折簡豈意惠然來畫圖相看一笑但臆對妙契未許巵言㪺清水寒玉照林表和氣春風生坐隅齊居頓覺俗氛逺髙致已逼沉痾蘇我方歸思劇迅矢公自有分居方壺過從此去計必少夢中道路多縈紆便當卷奉江湖去願得始終如蟨驉小樓對間間宗師象因次舊韻寄之鼎食不解肥我臞多病亦為山林驅巾車孤舟任所適何往不可容微軀莫言五十未為老縱有七十來須臾今年兩耳得差勝飽聽萬籟吹笙竽閒人多事迫詩債野老敗興時招呼小樓今日好風色目斷天末冥鴻孤一時幽興豈容負况對蓬島神仙圖篆煙凝坐共心賞盡醉更把空尊㪺懷人未免有芥蒂處世已覺無亷隅分江小鼎煮粟粒誅茅别墅營屠蘇逺山但藉一枝杖中流誰辨千金壺菊籬秋香晚未減松窗月色寒相紆我行不武分斂迹安得甘草資蛩驉田家對雪野老能留客柴門更反關落梅㸃衣上飛雪墮杯間地僻偏宜竹窗幽更對山自憐真野逸瓶罄不知還神仙雨山中日日雨松竹早知秋清響自深夜逸人無逺愁窗虛聞落葉林暗見螢流對景因懷杜江村事事幽題趙幹江樓風雨圖人間蕞爾東南陬金陵李家無逺謀詞華欲繼後庭曲不見東風空小樓當時百事尚纎麗况在畫工專末技洪河喬嶽昧平生曲䦨幽檻窮清致石頭城下無重關甲馬營中有佳氣九天飛墜曹將軍畫卷版圖充上計小兒造化吁可憐乾坤又到宣和年君王搖毫自塗抹片紙落世人爭傳坐看南北又分裂遂使兩家同一天偶從素縑閲小景慨念興亡豈天定而今蕩蕩混一圖但少儂歸理釣艇僧圓至寒食月暗花明掩竹房輕寒脈脈透衣裳清明院落無燈火獨繞回廊禮夜香曉過西湖水光山色四無人清曉誰看第一春紅日漸髙絃管動半湖烟霧是游塵送人送子江頭水亦悲更能隨我定何時垂楊但為秋來瘦不為秋來有别離元藝圃集卷四
