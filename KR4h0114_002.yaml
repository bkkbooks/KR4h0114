body:
  text: 元藝圃集卷二明李蓘編趙孟俯溪上溪上春風吹栁花溪頭春水淨無沙白鷗自信無機事玄鳥猶知有歲華錦纜牙檣非昨夢鳯笙龍管是誰家令人苦憶東陵子擬向田園學種瓜過嶽王墓嶽王墳上草離離秋日荒涼石獸危南渡君臣輕社稷中原父老望旌旗英雄已死嗟何及天下中分遂不支莫向西湖歌此曲水光山色不勝悲和子敬秋懷吳宫煙冷水空流慘淡風雲萬里秋禾黍故基曾駐輦芙蓉高閣迥添愁繡楹錦柱蛟龍泣金沓瑤階鹿豕遊宋玉平生最蕭瑟欲將九辨賦離憂絶句春寒惻惻掩重門金鴨香殘火尚溫燕子不來花又落一庭風雨自黃昏梅花開盡雪飄零楊栁青青春水生一夜東風吹鴈過江南江北故鄉情見章得一詩因次其韻水色清漣日色黃梨花淡白栁花香即看時節催人事更覺春愁惱客腸無酒難供陶令飲從人皆笑酈生狂城南風暖遊人少自在晴絲百尺長奉和帥初雨中見贈正坐清談與世違交情如子定應稀圖書跌宕心猶在裘馬清狂意巳非黃鶴未知何日返飢烏故作傍人飛溪南流水清如玉終擬歸休理釣磯東陽八詠樓山城秋色淨朝暉極目登臨未擬歸羽士曾聞遼鶴語征人又見塞鴻飛西流二水玻璃合南去千峰紫翠圍如此山中良不惡休文何事不勝衣蛾眉亭天門日湧大江來牛渚風生萬壑哀青眼故人携酒共兩眉今日為君開蒼崕直下蛟龍吼白浪橫空鵝鸛回南眺青山懷李白沙頭官渡自相催時與劉伯宣尚書同登趵突泉濼水發源天下無平地湧出白玉壺谷虛久恐元氣泄歲旱不愁東海枯雲霧潤蒸華不注波濤聲震大明湖時來泉上濯塵土氷雪滿懷清興孤題范蠡五湖杜陵浣花春色醺人苦不禁蹇驢馱醉晚駸駸江花江草詩千首老盡平生用世心題孫登長嘯圖在澗幽人樂考槃南山白石夜漫漫空林無風萬籟寂長嘯一聲山月寒題羣仙壁羣仙來會蘂珠宫花滿瓊山翠滿空環珮珊珊五雲際半天鸞鶴舞春風題王子慶所藏大年墨鴈鴻鴈栖栖遵渚黃蘆索索鳴秋羡殺承平公子筆端萬里滄洲馬祖常擬古崇臺拂繁雲阿閣蔭廣路上有彈琴女文彩被煙霧玉食薦翠盤渴飲瓊草露鄙薄貧士妻終歲弄機杼春雲高雲起城闕流離度庭樹依風拂回塘波纈光彩注荒林帶疏煙照日亂縈縷婉孌連浮陽空明映凄霧嵐翠含玉暉景采滿嵓嶼逍遙幽賞諧緬邈世娛阻雜詩四時更代謝物化常隨之春華曾幾何歲月忽如兹嚴風動高林百草俱已萎人生况有役憂患乃其宜棄捐勿復念出入由化機安得松喬術邈與世相違題李伯時元祐內廄五馬圖黃太史書其齒毛五馬何翩翩瀟灑秋風前君王不好武芻粟飽豐年朝入閶闔門莫秣十二間雄姿耀朝日滅沒走飛煙顧盻增意氣羣龍戲芝田駿骨不得朽託兹書畫傳誇哉昭陵石歲久當頽然慶壽僧舍即事白雨映青松蕭颯灑朱閣稍覺暑氣消微涼度疏箔客居秋寺古心迹俱寂寞夕蟲鳴階砌孤螢炯叢薄展轉懷故鄉時聞風鳴鐸題先天觀對此山水詠使人塵慮銷况兹構真館燕坐逺煩囂青林蔭户牖素雲冠山椒松風和澗泉雜佩響瓊瑤焚香玉女降長齋百靈朝仙道本不逺清都亦非遙自嗟衰莫年頗費猿鶴招安得生羽翰從子以消搖偶記舊詩一首在德清別業時作春情浩無端野興欣有矚山光艷桃李澗影㵼松竹古來巖穴士白駒在空谷幽鳥何處來啼破林煙緑贈恢上人晨坐古松下有僧來叩扉松花落金粉細細點春衣折松當麈尾相對淡忘機湯休不可作政索解人稀贈相士我昔放浪江湖間舉頭開眼看青山安知世故不相舍坐受塵土凋朱顔髭鬚已黃行且白亦知人生不滿百功名富貴非我事但願有酒呼好客錢塘江邊逢少年兩眼善相口談天封侯食肉骨法異慎勿置我諸公前江南春暖水生煙何日投間苕水邊買經相牛亦不惡還與老農治廢田贈相者吾聞伯樂善相馬一顧千金長高價何人倜儻買權竒滿眼駑駘居櫪下張君年少目有神走半江湖多閲人我生瘦愞乏駿骨浪許騰驤防未真連朝春雨今始晴花枝照眼生春情樓前山色橫翠靄湖上栁黃飛亂鶯便須沽酒與君飲醉倒花前且高枕懶從唐舉問流年欲向德翁謀小隱題額森特穆爾開府宅壁畫山水歌大山崒嵂摩青天小山平逺通雲煙商侯胸中有邱壑信手落筆分清妍閬風玄圃元不逺粲爛金碧流潺湲參差澗谷樓觀起縈紆石路朱橋連松風颼飀響虛閣棋聲剝啄來羣仙漁歌樵唱渺何許綸巾羽扇清溪邊高情自有泉石趣涼意不受塵埃纒世間書畫亦豈少誰能真賞如公賢華堂風日不到處絶勝繡幕空高懸舉觴酌酒為公壽眼明對此三千年題商德符學士桃源春曉宿雲初散青山濕落紅繽紛溪水急桃花園裏得春多洞口春煙搖緑蘿緑蘿搖煙挂絶壁飛流淙下三千尺瑤草離離滿澗阿長松落落凌空碧雞鳴犬吠自成村居人至老不相識瀛洲仙客知仙路點染丹青寄輕素何處有山如此圖移家欲向山中住贈張彥古秋雨新已風日清忽聞剝啄敲門聲出逢麻衣老仙伯身長七尺雙瞳明平生學道幾半世一見灑灑心為傾大道無為返爾朴自然有路通長生我今素髮颯以白宦途久矣思歸耕吳興山水况清絶白雲滿領堪怡情老仙何當從我去小築茅屋依崢嶸還丹已就蓬島近笑指塵海尋方平燕脂驄圖歌騏驎騕裊世常有伯樂不生淹棧豆歘見此圖神自王權竒磊落龍為友隅目晶熒生紫光錦毛錯落蒙清霜霜蹄蹙踏寒玉響霧鬛振動秋風涼朝浴扶桑騰浩蕩莫秣崑崙超象罔雄姿似隘六合小盛氣欲薾浮雲上嗅塵一噴驚肉飛奮迅不受人間鞿豈惟萬馬羞欲死直與八駿爭先馳只今相者多舉肥歎息此圖誰復知君不見王處仲半生隱德真成癡偶成竹林深處小亭開白鶴徐行啄紫苔羽扇不搖紗帽側晚涼青鳥忽飛來浮玉山玉湖流水清且間中有浮玉之名山千帆過盡莫天碧惟見白雲時往還金山江水西來接太空中流突兀湧鼇宫妙高臺上一回首看盡世途風浪中和黃景杜雪中即事君説江南苦未歸香橙新酒蟹螯肥何當與子扁舟去共挽清溪浣客衣當年臨水照春衫浮玉山前水似藍歸計未成羇思惡為君飛夢到城南幽獨獨坐不自聊披草尋微徑夕陽在高林籬落有餘映依依增逺想厯厯生晚聽涼蟬軋鳴筝候蟲擊清磬大小皆有從雄雌各相應沉吟復躊躇忽覺西山暝松澗詩贈丁師善青松上參天下有幽澗泉高人居其間萬慮不至前讀書得妙趣視世等浮煙胡為舍此去杖策走日邊要當陳忠益民瘼會有痊却歸弄泉石靜聽松風眠兵部廳事前枯柏庭前枯柏生意盡枝葉乾禽掫木病黃風白日吹沙塵鼓動哀音亂人聽嗟哉爾有歲寒姿受命於地獨以正雨露雖濡心自苦鳯鳥不來誰與盛豈無松檟在山阿只有蓬蒿沒人脛我生愧乏梁棟材浪逐時賢繆從政清晨騎馬到官舍長日苦飢食還併簿書幸簡不得休坐對枯槎引孤興人生何為貴適意樹木託根倣先性幾時歸去卧雲林萬壑松風韻笙磬初至都下即事盡日車塵馬足間偶來臨水照愁顔故鄉兄弟應相憶同看溪南栁外山登都北神山醉中題壁過溪踏瑶瓊入山採蒼翠仙宫名神山下負六鰲背我來訪丹藥羽人已千歲清嘯響山谷幽姿媚松檜白水從北來南與衆川會開忩目沃野千峰儼相對自是山林樂何但官爵貴買田釀清泉里社日相慰詩成悵如失天風逼衣袂東望鄒衍廟杯酒可逺酹談天劇當時古屋尚粉繪騎驢獨歸去人世空一喟息齋風竹圖道士華山隱得之命豫賦之往年家住篔簹谷丹鸞之實美如粟玄雲翻空下深靚昆吾寶劍削秋玉石衣清錦侵書光風微粉墮生細香琳館瑶臺九天近夜寒笙磬聲鏘鏘萬斛蒼煙鬱江雨二妃彈瑟瀟湘浦郫筒蜀酒亦堪沽蟠石雙杖令誰取河朔歲晏氷為梁羣木鱗皴臨雪霜遲汝狂颷莫吹裂截管他年侑帝觴李夫人未央天子香醺骨美人不貯黃金屋水銅無光澀秋月留得當年舊蛾緑瑶臺夜佩聲闌珊沉雲呌鴈沙泉寒二十五弦彈鳯凰玉叉小燕飛春山祝丹陽祠武當東窺禹穴西龍門狎虎豹兮觀魚龍中有武當神所宫捫摩光景慿雲風旁礴俯入厚地裂環視百鎮真叢叢延祐天子聖明主萬歲千秋作風雨蔡州妓趙氏墜崖以死自誓作詩諷俗鱗鱗汝水氷碧光汝之左右百草芳紅蘭紫桂媚長晝鉤輈鳥子回銀塘茭蒲無數菱葉小西家鞦韆屬年少燕泥霽雨風景酣簾幕依稀有歌笑趙氏女子邯鄲娼綵絲繡履踏春陽心思宛轉縈雲縷羞對兒郎唱鳯凰樂山嵯峨石生雨鄉人迎神奏歌舞婆娑起向神祠前祝願生身事針組野風吹目雙淚零泉聲松韻相泠泠諸言女子親愛癖誓死命輕如鳥翎鳥翎飛上合歡樹開花夜夜無愁苦秋香不斷相思浦玉叉斷股埋黃土題簡天碧畫山水西江隱君簡天碧醉來畫水復畫石春山秋樹緑更紅木橋野屋橫且直煙雲蓊鬱風雨交元氣淋漓障猶濕雪篷夜宿魚尾舠晴蓑曉挂牛角帙岷關巫峽冬氣清猿啼鳥嘯天一尺老來看畫眼苦澀便擬買田溪水側脫去賜帶繫芒履著書五車刻苔壁春行南郊緑樹連城合蒼藤入澗懸作橋分野路取竹縛溪船載酒誰留客看花我欲顛歌詩諧故老笑語屬神仙自鑿蒲萄井人開苜蓿田㗸櫻黃鳥弄窺藻白鷗翩狎坐欣時俊隨行喜少年山陰知寂寞春服且雲煙劉辰翁春晴江栁長天草色齊新晴何物不芳菲無因化作千蝴蝶西蜀東吳欵欵歸新燕池塘緑雨肥初晴未暖日光微角巾猶帶花梢濕才倚闌干見絮飛鮮于樞湖上曲湖邊蕩槳誰家女緑慘紅愁問無語低回忍淚並人船貪得纒頭強歌舞玉壺美酒不消憂魚腹熊蟠棄如土陽臺夢短匆匆去鴛鎖生寒愁日暮安得義士擲千金坐令桑濮歌行路楊奐録汴梁宫人語一入深宫裏經今十五年長因批帖子呼到御床前殿前輪直罷偷去賭金叉怕見黃昏月殷勤上玉階人間多棗栗不到九重天長被黃衫吏花攤月賜錢邊奏行臺急東華夜啓封內人催步輦不候景陽鐘駕前雙白鶴日日候朝回自送鑾輿去經年更不來陡覺文書靜相將立夕陽傷心寧福位無復夜薰香別殿弓刀響倉黃接鄭王尚愁宫正怒含淚強添粧一向傳宣喚誰知不復還來時舊針線記得在窗間晚至青口長年困行役短髮易飄零世事驚春夢交親散曉星燒䀶侵路黑栁色夾堤青落日明霞底原情動􅜇鴒得邳大用書復寄百年真夢寐萬國久風塵老去偏相憶書來恨不頻季鷹猶在洛王粲未歸秦谷口知何似他時願卜鄰次答伯直侍郎家貧餘四壁地勝接三鄉才賦狂司馬形容老遂良畫眉從爾闊舞袖為誰長生死交情在書紳示不忘有懷梁仲經父美人熒熒在何處海濶天低隔煙霧珊瑚零落芙蓉空咫尺相望迷逺路翠輦金輿雙鳯凰風吹環珮聲琅琅壺觴狼藉事已往一日萬里愁茫茫劉郎竟是誰家客歲晚霜華林葉赤美人熒熒在何處鴨緑江頭江月白浮生懷裕之漢節飛雲外秦城落照邊浮生空自老歸計定何年淚滿陳蕃榻心遙祖逖鞭短詩聊遣興羞向故人傳吳訥李將軍歌太倉積粟皆紅腐羣貓晝眠鼠變虎前鋒不見李將軍何人為發千鈞弩去年我從昱嶺來匹馬馳突三關開北平未入衛青幕郭隗獨上燕昭臺近聞西府羅俊彥人人自謂能酣戰誰似當年背水軍赤幟才臨趙城變英雄報國如等間馬革裹尸銅柱間明朝按劍收中山謗書慎勿回天顔鐵崖仙人歌為楊亷夫先生作鐵崖山中鐵笛仙落花滿身花底眠兩龍携來東西語蟠桃一醉三千年偷桃更有東方子拍手一笑天門裏眼中九點齊州煙案上小兒不如蟻歸來跳入壺中天鐵仙亦在蓬萊巔回首樓船問瑤草水弱雲深秋月老先生有雙鐵笛名之曰大鐵龍君小鐵龍君汪莊寄友覺來一悵望幽興知有期炊煙出深竹