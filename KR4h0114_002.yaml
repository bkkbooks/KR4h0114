袍棲身斷人迹遊目送鴻毛樹挂栖崖鷙藤懸飲子猱龍眠石澗冷虎撼樹根牢木客吟時共山樵奕處遭浮雲過水盡木葉挾霜高羽使來三島胎仙舞九皋左招玉斧飲右攬赤松遨空色收寥廓虛聲起繹騷彈琴遺古散載酒掉輕舠遂向圖中見誰能世外逃乘槎幾月至一泛九秋濤宣和墨竹寒雀灑墨寫琅玕深宫春晝間蕭條數枝雪不似紇干山揭徯斯憶昨宫草蔥茸禁樹齊日趨延皓對凝暉朝迎步輦花間立莫送回鸞栁下歸碧殿東臨瓊島近金河背引玉泉肥幾回宏慶門前路春雨濛濛欲濕衣夢武昌黃鶴樓前鸚鵡洲夢中渾似昔時遊蒼山斜入三湘路落日平鋪七澤流鼓角沉雄遙動地帆檣高下亂維舟故人雖在多分散獨向南池看白鷗送道士薛元卿歸江東知君此去漸難招只在人間已廓寥市上有時逢賣藥山中何處覔吹簫仙岩花落溪流滿鬼谷雲開樹影遙未必故山安隱逸海天涼月夜蕭蕭送詹宗師還廬山香爐峰色紫生煙一入京華路窅然雲碓秋間舂藥水雨犁春卧種芝田書憑海鶴來時寄劍自潭蛟去後懸忽報歸期驚倦客獨淹微祿負中年送王留守宣慰荆湖舟楫連檣出薊丘弓刀千騎入荆州歌翻郢雪寒暄變思逐岷江日夜流雲雨暝連神女宅山川晴繞仲宣樓豈無賢士堪招隱應向鹿門深處求贈王郎王郎楚狂士意氣飛秋霜讀書破萬卷下筆數千行富貴視浮雲况肯矜文章十五耻閭里掉臂辭故鄉夜宿東海月朝買西州航瞋目王公前結客少年場一飲或一石一醉或十觴寧揖屠狗人不與俗士當千金不易笑歲暮單衣裳阮籍在窮途英聲連四方鸞鵠有時鎩反愧燕雀翔世無劇孟交不及青樓倡燕趙如花人翠袂黃金璫不識豪俊士空媚癡與狂王郎逺過我坐我枯藜床終夕無酒飲撫髀歌慨慷平明別我去極目空茫茫高郵城高郵城城何長城上種麥城下種桑昔日鐡不如今為耕種場但願千萬年盡四海外為封疆桑陰陰麥茫茫終古不用城與隍飲張氏别墅楚國多才俊張家好弟兄出門湖水碧留客野堂清微雨鳴疏竹寒煙覆古城園人隔畦語歲暮此中行山莊晚有懷舍姪督穫臨川䔩䔩黃桑葉蒼蒼白竹峰居門爭野碓歸客背村鐘路暗緣溪濕山寒著霧濃阿咸收稻未辛苦缺相從寄劉師魯想君遊宦處正直洞庭湖落日波濤壯晴天島嶼孤舟航通漢沔風物覽衡巫天下文章弊非君孰起豫贈胡汲古野客何蕭散長年暫出遊風塵惟短褐江海自扁舟有迹能來往無心任去留才名今藉甚屈指到枚鄒送徐義父入京幽燕向日邊裘馬去翩翩磧逈沙如雪河窮浪入天上書雙闕下待詔五門前壯節當竒遇無煩愧往賢題花鳥圖吳中女兒顔色好洗面看花花為悄調朱弄粉不自施寫作窗間雪衣鳥緑窗沈沈春晝遲半生心事花鳥知花殘鳥去人不歸細雨梅酸愁畫眉秦淮秦淮江上送飛鴻秦淮水流西復東六朝人物已寂寞萬古雲山空疊重明日還沽采石酒昨朝猶聽廣陵鐘人生不似寒潮水去去來來有定蹤滕賓感遇吾愛李太白玩世如遊龍自知天上謫何必人間容海風吹緑髮蕭蕭卧雲松我昔夢見之遺以金芙蓉清輝恍在眼月落蛾眉峰吟人吟人瘦倚玉闌干酒醒香消午夢殘燕子不來春事過半簾疏雨杏花寒贈弓秋蟾瓊花十里小樓紅醉吞牛斗眠長虹十年四海分萍蓬一笑邂逅滕王洪床頭回首黃金空但見耿耿盤心胸問蟾何不歸蟾宫自有老月留身中誰受一粒金丹紅學得紙上畫黑龍白晝呼吸風雲從頃刻霧暗天濛濛妙處巧奪造化工不復知有陳所翁君不見金陵壁上不點瞳點瞳霹靂驚江東我欲煩君具毫楮畫一小龍回顧母普令天下生孝心不向江湖長驗雨訪隱西風短褐飛黃埃何不從我遊蓬萊狂歌醉舞下山去後夜月明騎鶴來黃溍北山紀遊却問仙山去幾程白雲如簇近相迎直須不脫登山屐行盡松聲與水聲開元宫誰使藏舟一夕移紅樓翠幕未全非曾聞帝子乘鸞去疑有仙人化鶴歸煙徑月明瑤草歇石壇露冷碧桃稀赤闌橋畔多時立間看揚花作雪飛龍潭山二月清江照眼明避風舟楫滿回汀斷雲挾雨時時黑密葉藏花樹樹青習隱未成陶令賦行歌聊共屈原醒碧潭光景無消息坐看遊魚點翠萍送覺上人遊金華憶同夜上妙高臺坐聽泉聲響怒雷久別煙霞如夢寐舊遊岩石長莓苔挂冠方厭人間事飛錫俄從世外來何處深春可遊客金華山色紫崔嵬憶友人無復高談慰索居壯心零落竟何如人間漫有金臺夢身後誰傳玉枕書半畝蒼苔埋璧地一聲白雪斷絃初芙蓉峰下聞吹笛淚滴春天草木疏題雪竇妙高臺偶為清遊宿梵宫凌晨試上最高峰水翻雪色寒猶落雲掩丹光逺更重舊有一僧能跨虎近聞三洞盡藏龍下方車馬應難到煙際唯聽日暮鐘送張秀才歸里青陽河畔杜鵑啼歸路如弦定不迷應到故山叢桂裏笑人騎馬聽朝雞北山紀遊坐愛春泉響翠微玉花吹濕薜蘿衣何由著我氷壺洞卧看青天白練飛題丁文苑同年哀詞後自别瓊林雨露邊江湖目斷繡衣前禹門尚想龍初化遼海驚聞鶴已仙烈日秋霜空耿耿重山宿草正芊芊不才死後知何用坐對諸郎獨泫然劉蕡祠堂劉君古遺直祠堂在丘園嗟此豪俠窟文雄倏孤鶱平生二三䇿匪邀明主恩瑣瑣談得失無乃市井言憑高一長望若厭車馬喧微風過疏雨青山滿前軒陰晴欻異態浮雲實無根悠悠千載心去去無復論傅若金宿崇仁峽扁舟夜宿魚龍窟久客長懷虎豹關歲暮思家成白髮天涯持酒看青山張騫浪喜葡萄入馬援終嫌薏苡還天子只今勞遣使將軍何日遂平蠻駕發天門曉啓黃金鎖路馬遙翻碧玉蹄銀燭熒熒花外出翠蕤冉冉栁邊迷千官劍佩屯雲合五衛旌旗擁日齊後夜龍沙駐清蹕侍臣不寢聽晨雞仇工部古松歌蒼松在山自奇古灌木翳之人不驚忽然圖向堂上壁滿座歎息長風生交柯崛走森晝晦其下將疑鬼神會霧雨寒霏虎豹毛雷霆怒坼蛟龍背乃知巨筆老且神力斡造化雄千鈞皇天不夭棟梁具后土潛回霜雪春爾松已為人愛惜見爾為爾生顔色山中豈無材木倚絶壁未逢匠石嗟何益常寧劉百户園林少壯從戎事歸休遂野情鶡冠時自著龍劍夜猶鳴竹下思羊仲瓜前感邵平知君縱幽賞心已薄浮名和危山臞寄弟故園兄弟總相思久客懷歸屢失期司馬却慚題柱早東方翻恨上書遲都門栁暗愁中見鄉國花繁别後知昨日南橋放春水望雲回首獨多時題書船入蜀圖送蔓州教黃尚質楚客之官泛蜀船畫圖盈尺見山川九江樹色瀟湘外三峽猿聲灧澦前方譯漸通巴俗語國書新絶漢人傳豈無好事能携酒問字時時集講筵王氏師山庒相師之山雲杳冥千巗萬壑倚空青上方雷雨藏天井南極風煙落洞庭溪客去迷花藹藹野人居愛竹泠泠何時遂買登山屐乘興還來叩石扄龍翔寺梵王宫殿倚青冥先帝旌幡擁百靈寶網自鳴空裏樂琅函時出賜來經近山鳯去花仍碧遙海龍歸樹獨青玉輦宸遊竟寥廓行人揮淚讀新銘秋興天上旌旗捲暮寒人間鼓角送悲酸瑤池落日回青鳥月殿浮雲掩素鸞楊栁漸稀風瑟瑟芙蓉已老露溥溥砧聲苦近南鄰客寥落羇懷強自寬甘立吳王納涼圖六月長洲水殿涼酒酣揮袖倚新粧芙蓉露冷秋雲薄迥首西風響屧廊題柯博士墨竹嶰谷春深落粉香拂雲和露倚蒼蒼月明後夜吹簫過應是伶倫學鳯凰春日有懷柯博士闔閭城外亂鶯啼笠澤春深水滿陂好買扁舟載圖畫布帆東下若耶溪聞説新來白髮稠茂陵多病不勝愁吟成定似張公子癡絶真成顧虎頭賈治安騎驢圖西風烏帽鬢毿毿拂袖長吟倚暮酣得句不衝京兆尹蹇驢行遍大江南古長信秋詞缺月流光入綺疏金壺傳箭夢回初秦臺彩鳯無消息桂影空間十二除輦路青苔雨後深銅魚雙鑰晝沉沉詞臣還有相如在不得當時買賦金昆明池歌樂彩鷁齊飛簇畫旗甲光如水入雲低長楊五柞遙相望笳鼓歸來日每西博望封侯萬里還血流赤海骨如山將軍新賜樓船印錦纜牙檣杳靄間元藝圃集卷二
