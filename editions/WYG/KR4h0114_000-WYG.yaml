body:
  text: 元藝圃集總集類提要臣等謹案元藝圃集四巻明李蓘編此集續宋詩而選所錄凡一百八人詩六百二十五首自序稱地僻少書籍無以盡括一代之所長今觀所錄有虞集范梈揭傒斯而無楊載即一代名人號為四家者已闕其一是漏畧誠所不免又劉辰翁乃宋人王庭筠髙克恭元好問乃金人僧來復乃明人一例載入頗失斷限其編次則倪瓉宋元余闕等皆元末人而名在最前戴表元白珽等皆元初人而名在最後其他亦多先後顛倒頗無倫序似亦隨見隨抄未經勘定之本與宋藝圃集相同殆慵于排纂遂用唐無名氏搜玉小集不拘時代之例歟然其自序謂宋詩痼于理元詩鄰于詞則深中兩代作者之弊故其去取之間頗為不茍以云備一代之詩誠為不足以云鑒别則較之泛濫旁收務盈巻帙者精審多矣乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀元藝圃集原序余既選宋詩巳人有以元詩為問者余應之曰宋詩深刻而痼於理元詩膚俚而隣於詞是二者其弊均也而學人之辨於理也為尤難詩有至理而理不可以為詩而宋人之謂理也固文字之辨也箋解之流也是非褒貶之義也兹其於風雅也逺矣詞固詩餘也雖膚俚猶有故也逹於此可與言詩矣因間鈔元詩得六百二十五首曰元藝圃集以嗣宋後恨地僻少書籍無以盡括一代之所長世有博雅君子幸廣其所未備也萬厯十年壬午五月八日
