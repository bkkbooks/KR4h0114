body:
  text: 元藝圃集卷一明李蓘編劉因西山西山澹無姿中有羲皇前翻思太古人事業何不傳三墳亦何罪世逺成灰烟紛紛後來人暮死朝争妍勲名史一策學術文千篇古人豈不然後有無窮年惟餘方寸心天地相後先㑹隱山鳴禽變初節白雲思高山笑拊蒼然石為謝區中縁舉杯屬何人四顧心茫然雲烟互吞吐巖壑如相先人間此幻境過眼成千年山家有酒令飲外可無言隱仙谷山川含太古風氣如未開中有幽棲人日暮斸蒼苔吾胷素羲皇人世不可諧此地復何地怳若登春臺山扃掩對峙石徑迷縈回桑麻連水竹屋宇依山厓燕南避世謡千古知我懷横渠百世師一區竟相乖知音得元老龍門有遺齋賤子孤旅人念此良悠哉於世豈有望居山亦無媒舉杯對山靈欲去仍徘徊他年要勝跡此駕當招來泛舟西溪萬山倒滄浪一葉凌嵯峨嵯峨為飛舞翠影如婆娑輕陰散雨足淨緑生圓波人間碧海幻老眼青銅磨風雲幾千古辦此雨一蓑溪南有幽人鼓棹前山阿烟深𣺌無處月色浮松蘿白蓮氷華離風塵素質更深靜灝露凝幽香皎月散清景誰並絶世姿澹然水中影青芳生苦心秋風逼凉冷安得同愛人共此良夜永和歸田園居少小不解事談笑論居山為問五栁陶栽培幾何年安得十畆宅背山復臨淵東隣漢陰圃西家鹿門田前通仇池路後接桃源間熈熈小國樂夢想羲皇前石上無禾生粲爛空白烟營營區中民擾擾風中顛未論無田歸歸田誰獨閒迂哉仲長統論説徒紛然和連雨獨飲吾心物無競未醉巳頽然乾坤萬萬古坐我春風間弱女亦何知挽衣呼我仙窺人簷鳥喜共舞風雩天舉觴屬羲皇身在太古先忽遇弄丸翁見責久不還一笑了無間今夕是何年遙遙望白雲欲辨巳忘言和飲酒士窮失常業治生誰有道身閒心自勞齒壯髪先老客從東方來溫言慰枯槁生事仰小園分我𤓰菜好指授種藝方如獲連城寶他年買溪田共住青林表和擬古客從闗洛來高論聽未終連稱古英傑秉國或從戎建立天地極蔚為蓋世雄功成脱敝屣飄然薾遺風生世此不惡君何守賤窮急呼酌醇酒延客無何中同遊非所思所思天一隅有問所思誰意在不言舒古今猶旦暮四海同一廬恍惚精靈通似見與我居攬衣欲從之寒月照平蕪茫然不知處歎息將焉如翩翩誰家子慷慨歌逺遊忽記少年日猛志隘九州何物能勸人有此歲月流君心海無底亦使成高丘瞻君一巻書其傳自衰周讀此當自悟擾擾將焉求和雜詩朝耕隆中田暮採成都桑平生淡泊志醜女同糟糠愛此真丈夫忘我厨無糧當年靜修銘團茅雞距陽回頭十五載塵跡徒自傷山居久岑寂主靜豈無方安得無極翁酌我上池觴雞距保府泉名有靜修龕在焉采菊圖天門折翼不再舉袖手四海横流前長星飲爾一杯酒留我萬古羲皇天廟堂衮衮宋元勲争信東籬有晉臣南山果識悠然處不惜寒香持贈君抱陽南軒下瞰縣崖老木稠輕風毛髪散凉秋蒼苔白石夢初覺霽月疎雲山欲流銅雀瓦硯諸侯負漢巳堪憐直筆何為亦魏編却愛曺瞞臺上瓦至今猶屬建安年仙人圖千古誰傳海上山坐令人主厭塵寰蓬萊果有神仙在應悔虛名落世閒春景病餘身世淡無情但覺春來暖漸生送客出門花巳謝問知昨日是清明今月今月柴闗幾客來擬從屐齒數莓苔求文道士花前至載酒門生雨後回觀梅有感東風吹落戰塵沙夢想西湖處士家只恐江南春意減此心元不為梅花山家馬蹏踏水亂明霞醉袖迎風受落花怪見溪童出門望鵲聲先我到山家溪上坐久蒼苔如見侵攜笻隨水就輕隂松風自厭灘聲小雲影旋移山色深西郊偶因訪客出西城一色寒蕪滿意平行過溪橋嘗脚力招來野老問山名春盡草閣垂簾晝掩扉客來知我出門稀鳥鳴淡與人相對花落方知春巳歸寒食道中簪花楚楚歸寧女荷鍤紛紛上塚人萬古人心生意在又隨桃李一番新廢園路傍雙石立崔嵬曽見遊人幾往來想得當年全盛日好山横處盡樓臺庚辰元日曾記西湖酒一巵乾坤和氣入新詞六年未盡冰霜怨又到春風滿面時飲山亭雨後山如翠浪經雨漲開軒宛坐扁舟上西風為我吹拍天要駕雲㠶恣吾往太行一千年一青才遇先生醉眼醒却笑劉伶糟麴底豈知身亦屬螟蛉陳氏莊陳氏園林千户封晴樓水閣圍春風翠華當年此駐蹕太平天子長楊宫浮雲南去繁華歇回首梁園亦灰滅淵明亂後獨歸來欲傳龍山想愁絶今我獨行尋故基前日家僮白髪垂相看不用吞聲哭試賦宗周黍離離觀雷溪飛狐天下􅆃老氣盤互回三江㵼天怒合為一水東南來此勢不殺令人愁石門喜見西山開未補青天裂誰鑿混沌胎奇聲猛狀萬萬古山根幾許猶崔嵬西山倒傾瀾百丈逢巔崖先聲動毛髪餘爽開襟懷初疑萬壑轉奔石意像髣髴坤軸摧又疑鼓角鳴地中百步未到仍徘徊荒祠下石磴駭目何雄哉春風不到太古雪今日乃得胸中雷穿石誰能窮窟宅流沫勢欲浮蓬萊平生芥蔕今寒灰兩耳到骨無纎埃酈元筆頭天下水石門之竒猶見推乃知兹遊亦奇絶快弄素電噴瓊瑰東崕一片石坐撫千年苔為招郎山君共捲長鯨杯江妃為撾靈鼓催赤鯶躍出銀山堆先生醉來泉灑面狂歌一和湍聲哀浙江潮圖山人懶絶夢亦然鼎如萬牛不可遷誰信畫工筆頭有神力扁舟一夜江聲寒覺來千里雪漫漫中有數㸃青峨閒人間天上壯觀巳如此豈知大塊喘息四海如鼻端海中仙人氷雪顔吸風御氣非人寰試問濤頭何當還為我寄聲三神山我欲乘興遊其間早秋昨朝一葉見秋生今日千巗萬壑清欲借西風蘇病骨暫來石上聽松聲翟節婦詩兵塵浩無際烈女難自全婦人無九首志欲不二天燕山翟氏女既嫁夫防邊一朝聞死事健婦増慨然生有如此夫早寡非所憐求尸白刃中負土家山前事去哀益深義盡身可捐無兒欲何為所依惟黄泉鄉人捄引决烈日丹衷懸誰辨節孝翁重賦睢陽賢我昨過其鄉山水猶清妍聞風髪如竹飄蕭動踈烟千年吟詩臺峩峩大寧巔為招馮大師和我節婦篇白馬篇白馬誰家子翩翩秋隼飛袖中老蛟鳴走擊秦㑹之事去欲名留自言臣姓施二十從軍行三十始來歸矯首望八荒功業無可為將身弭大患報効或在兹豈不知非分常恐負所期非干復讐怨不為酬恩私偉哉八尺軀膽志世所希惜此博浪氣不遇黄石師代天出威福國柄誰當持匹夫赫斯怒時事亦堪悲秋晚登西山十日罷琴誦招搖慕飛仙天風何許來吹我蒼崕巔誰知此絶境秋華亦芳鮮采采泛清樽山容變春妍只應城中人遥知弄雲烟若見孤鴻來可咏悠然篇送徐生還鄂燕山送客歸南州興來每恨無扁舟君歸我為謝江漢思君不見令人愁千里風烟想瀟洒一代英雄成古丘當年氣力鸚鵡洲撫掌笑殺黄鶴樓黄鶴歸來哀江頭江山依舊人悠悠浮雲萬古恣變滅眼中擾擾何時休紫陽仙人歌逺游飛蛟起滅三千秋為君揮手崑崙頭蠡吾翁王畫像北門翠屏雷破山畢逋頭白五馬遷乾坤運㑹到血肉有欲托之誰飛仙河朔諸州尤可憐有饑以來無此年鄉閭𠻳𠻳公哺之公囷有底心無邊諸豪推讓彼亦義亂世性命公能全教子讀書不求官歸來素髪家山前天理不隨陵谷變坐看老樹生蒼烟只今圖畫對公像回首兵塵一慨然誰能生死太平日白石共煮西山前宋高宗題李唐秋江圖秋江吞天雲拍水濤借西風扶不起斷雲風雨入江村回首龍沙幾千里澹菴老筆揺江聲髣髴阿唐慘淡情千秋萬古青山恨不見歸舟一葉横金太子允公墨竹黑龍江頭氣鬱葱武元射龍江水中江聲怒號久不㵼破墨揮洒餘神功天人與竹皆真龍墨竹以來凡馬空人間只有墨君堂何曾夢到瓊華宫瑶光樓前月如練倒影自有河山雄金源大定始全盛時以漢文當世宗興陵為父明昌子樂事孰與東宫同文采不隨焦土盡風節直與幽蘭崇百年圖籍有蕭相一代英雄推蔡公策書紛紛少顔色空山夜哭遺山翁我亦飄零感白髮哀歌對此吟雙蓬秋聲蕭蕭來晚風極目海角天無窮黑龍江見金史幽蘭軒義宗死所汴亡張蔡公以金實錄歸遺山嘗就公謄錄此軸亦公得於汴之中秘者公之子仲仁持以求余詩故終篇及之登鎮州隆興寺閣太行鱗甲揺晴空層樓一夕蟠白虹天光物色驚改觀少微今在青雲中初疑平地立梯磴清風西北天門通又疑三山浮海至載我欲去扶桑東雯華寶樹忽當眼拍肩愛此金仙翁金仙一夢三千載騰擲變化天無功萬象繞口恣噴吐坐令四海皆盲聾千池萬沼盡明月長天一碧無遺蹤我生𤣥感非象識此眼此臂將安庸海嶽神光埋禹鼎人間詭態何由窮金天月窟爾鄉國玉毫萬丈須彌峰一杯徑欲呼與語為我返駕隨西風堂堂全趙思一豁江山落落吾心胸中原左界此重鎮形勢彷彿餘兵衝歌舞遺臺土花碧旗幟西山霜葉紅乾坤割裂萬萬古烏鳶螻蟻為誰雄滹水悠悠自東注落日𣺌𣺌明孤鴻張元帥寶刀土不産金人氣雄真人握鐵開鴻濛不知此刀何所得風烟餘烈來霜鋒將軍聲名今蔡公酒酣遇我歌彤弓持刀對公兩奇絶眼中巳覺南江空水波江聲浩無窮朝礱夕淬天有工回鶻健兒戲天巧前身鐵精非凡庸紫烟焰焰天為紅繽紋秀發青芙蓉寶鐶搖落初開封四壁如著清水中天山積雪聚鋩鍔寒色直欲朱崕通摩挲神物三太息此行善保千年功雪浪石邵家水陸説影象一物自可涵無垠滄浪山人歌感應石中固有此理存老坡胸中如此幾磈磊須得銀河噴嘲嵩唾華天不嗔武夷赫怒張吾軍偶從北海得生氣竹石也愛風姿新我來正當秋雨霽一杯㝠漠𤣥都門小璫好事如先臣坐令平地石生根渠家兒戲解忘國作詩一笑君應聞食筍夢回齒頰風蕭騷幽姿不許霜風高南來蒼玉不盈束巳覺飲興飜雲濤詩家胸次自宜此尚嫌烟火須烹炰想像南方吹萬竹籜龍正恐稱寃號石盆養魚心自苦仰羡鸜鴝雲門巢眼中歲旱土不膏長鑱復慮山無毛退食歸來北窗夢山顛朱鳯聲嗷嗷三月三日許天祥置酒東城都門氣習豪翩翩此君尊爼今宛然春色今年遲半月留待怱怱過寒節臨流雅唱尋舊盟青眼青天對今夕横橋綺服麗人天蒼苔坐我羲皇前花枝華髮兩如許天意時情一杯舉安石起舞元龍歌蒼生我竟如渠何飲仲誠椰瓢君家瓠落無所容江湖誰辨平生胸海南佳氣久鬱塞灔澦似喜今相逢前年對酒面發紅今年對酒氣如虹江山萬古騷人國跬步便與華胥通河間古儒病我拘我聞一飲喜氣濃平生得意南湖張此意頗與河間同太古窪尊老無底一朝傾倒何由供醉鄉千年有此客鳥歌蝶舞春濛濛醉翁之意不在酒宛如琴意非絲桐太和風景無酩酊洛陽樓閣高玲瓏泠然仙馭一杯水眼中𣺌𣺌無極翁西家伯倫瞽且聾東家醉死王無功酒中醒境渠未識氷壺秋月崑崙峰舉杯喚月來胸中人間白日浮雲空五嶺山高雲幾重朱崕滅没南飛鴻𤣥鶴翩翩𣺌何許操瓢徑訪眉山公郭氏家山圖鹿門烟景接隆中翁媼通家社酒紅只有山童最神駿舊曾床下拜龎公明逺堂賞蓮醉賦畫堂香逺凝清秋宛如坐我南湖舟主人愛客情亦重謂我無語花應羞荷香繞筆詩自健滿紙巳覺清江流平生老氣回萬牛為君傾倒元龍樓舉杯喚起謝安石我醉不省蒼生憂記夢天風吹雲送星槎蒼鱗道前牽紫霞鳯凰呈舞月妃和飄飄來自金母家金母臨行有竒贈玉簫璚管聲清佳囑我醒時無泄露恐世知子生喧嘩明朝夢覺莫驚怪異香冉冉浮窗紗送國醫許潤甫還燕燕趙豪傑窟馬遷曾此求交遊即今勁氣壓河朔人物傑出嶄然雄九州燕南子許子胸盤星斗横高秋窮則良醫達良相古人須向今人求萬里黄雲馬上家歸來淚滿銀貂裘民病未蘇國支朽勿以一身戚而忘天下憂古來竒士重意氣把臂一語肝膽投君能搜我胸中磊落之竒才我亦為君冩我抑鬱之幽懷元好問緱山置酒靈宫肅清曉細栢含古春人言王子喬馭鶴此上賓白雲山蒼蒼平田木欣欣登高覽元化浩蕩融心神西望洛陽城大路通平津行人細如蟻擾擾爭紅塵蓬萊風濤深鬢毛日夜新殷勤一杯酒愧爾雲間人光武臺漢南地上遊荆楚兵四衝遊子十月來登高送長鴻當年赤帝孫提劍起蒿蓬一顧􅓳水斷再顧新都空雷霆萬萬古青天看飛龍巋然此遺臺落日荒烟重誰見經綸初指揮走羣雄白水日夜東石鱗幾秋風空餘廣武歎無復雲臺功出京從宦非所堪長告欣得請驅馬出國門白日觸隆景半生無根著飄轉如斷梗一昨隨牒來六月阻歸省城居苦湫隘羣動日蛙黽慚愧山中人團茅遂幽屏塵泥免相涴夢寐見清潁矯首孤飛雲西南路何永示姪孫伯安伯安入小學穎悟非凡兒屬句有夙性説字驚老師見汝挾書歸憶我青衿時青衿昨日耳齒髮忽如兹讀書誤人多濶疎亦天資元無倚天劍可斷扶桑枝倚梯望青㝠愚者知笑之壯事巳無取老謀欲何施幸此掌中孫未染如素絲就令好紙筆門户誰當支我有商於田爾壯可耘耔便當學種樹未用城南詩雜詩世事如大弩人若材官然乘勢易發機非時勞控弦又如大水中置彼萬斛船雖有帆與檣亦須風動天不見周公瑾弱齡巳飛騫不見師尚父鷹揚在華顛彼非生而材此豈晚乃賢鎡基喻智慧要必有待焉嘆息狂馳子嘗為愚者憐五松坪竹港晨露白石門秋氣寒湍流落澗壑細路深茅菅江平白石出竟日沿清灣四顧不見人山鳥時間闗蒼崕入地底烟靄青漫漫力盡不能過却坐空長歎青天白雲間可望不可攀虛名竟何得行路乃爾難曉發石門渡湍水道中疎星澹秋明陰霞絢朝映積雨成坐愁晨光動幽興石門歸馭引湍浦漁舠並曠蕩萬景新歸藏四山靜平湖風漪緑逺㟁秋沙淨洋洋游鯈逝汎汎輕鷗泳隱顯乖夙心感遇見真性倦遊徒自悼違巳將安竟憂端從中來茫茫發孤詠放言韓非死孤憤虞卿著窮愁長沙一湘纍郊島兩詩囚人生定能幾肺肝日相讐井蛙奚足論袴蝨良足羞正有一朝樂不償百年憂古來帝王師或從赤松遊大笑人間世起滅真浮漚曾是萬户封不博一掉頭有來且當避未至吾何求悠悠復悠悠大川日東流紅顔不假惜素髮忽已稠我欲升嵩高揮杯勸浮丘因之兩黄鵠浩蕩觀齊州别李周卿城居日蛙黽局促復局促去作山中客放浪誰檢束溪光淡於氷山骨淨如玉懷我同心人團茅住深竹垂綸鮮可食種秫酒亦足石壇三萬丈醉眼天一粟安得萬里風相從兩黄鵠九日讀書山用陶詩露凄暄風急氣清天曠明韻行帳適南下居人跼庭户城中望青山一水不易渡今朝川涂靜偶得展衰步蕩如脱囚拘廣莫開四顧半生無根著筋力疲世故大似丁令威歸來歎墟墓鄉里喪亂久觸目異平素枌榆雖尚存歲晏多霜露今日復何日霜露倏已凄登高有佳招山中古招提翩翩劉公子王田重相携乾坤動詩興澗壑忘攀躋霍侯家甚貧劣有酒與雞城居厭鼙鼔移家此幽棲世網不易逃所向皆塵泥何以濯我纓林間有清溪山腰抱佛刹千里望家園亦有野人居層崕映柴門昔我東岩君曾此避塵喧林泉留杖履歲月歸琴樽翁今為飛仙過眼幾寒暄蒼蒼池上栁青衫見諸孫疎燈照茅屋新月入頺垣依然覽陳迹惻愴不能言霜氣一匽薄杳杳秋山空臨高望烟樹黄落雜青紅造物故放縱窮秋變春容錦帳三百里不盡臺山東粲粲黄金華羅生蒿艾叢野人不知貴幽香散秋風秋物自横陳顧揖苦不供誰能搖醉筆吐句凌清雄宇宙有此山閲世過鳥疾何人不此遊名姓寧復識兹辰世所重前代多盛集柴桑有故事二謝留俊筆併數孟與桓此外誰記憶人生百年内踏地皆陳迹獨惟我輩人興懷念今昔山林與皋壤自古長太息我在正大初作吏浙江邊山城官事少日放浙江船菊潭秋華滿紫稻釀寒泉甘腴入小苦幽光出清妍歸路踏明月醉袖風翩翩父老遮我留謂我欲登仙一别半山亭回頭餘十年江山不可越目斷西南天讀書山月夕層崕多古木細路深莓苔柴門開曉日雲際青山來靜中有真趣孤賞何悠哉久旱雨亦好既雨晴亦佳胡床對明月樹影含清華墻東有汚池欹枕聽鳴蛙送郝講師住崇福宫大方之家幾知津郝君七十老斵輪書文五車喙三尺劇談混沌今猶神太𤣥博士為絶倒君言夸矣天公嗔長安冠蓋羅青雲洛陽車馬爭紅塵怪君掉頭不肯住寂寞來作山東隣崧高維岳古所秩三十六帝有外臣𤣥都石壇待颷馭宫殿突兀松輪囷上界仙人登雲山洞天治所名司真蓬萊方丈去不逺明星玉女時相親瑤華可擷蘭可紉烟霞永隔塵中人黄鵠一去不復返白鷗萬里誰能馴為我殷勤謝鄧君玉華歲晚當平分范寛秦川圖亂山如馬爭欲前細路起伏蛇蜿蜒秦川之圖范寛筆來從米家書畫船變化開闔天機全濃淡覆露清而妍雲興霞蔚幾千里著我如在峩嵋巔西山盤盤天與連九㸃盡得齊州烟浮雲未清白日晚矯首四顧心茫然全秦天地一大物雲雨澒洞龍頭軒因山分勢合水力眼底廓廓無齊燕我知寛也不辦此渠寧有筆如修椽紫髯落落西溪君長劍倚天冠切雲望之見之不可親元龍未除湖海氣李白豈是蓬蒿人愛君恨不識君早乃今得子胸中秦作詩一笑君應聞赤壁圖馬蹄一蹴荆門空鼔聲怒與江流東曹瞞老去不解事誤認孫郎作阿琮孫郎矯矯人中龍顧盼叱咤生雲風疾雷破山出大火旗幟北捲天為紅至今圖畫見赤壁髣髴烟燼留餘蹤令人長憶眉山公載酒夜俯馮夷宫事殊興極憂思集天淡雲閒今古同得意江山在眼中凡今誰是出羣雄可憐當日周公瑾憔悴黄州一秃翁半山亭招仲梁飲孤城鬱鬱山四周外人乍見如纍囚半山亭前浙江水只可與君消百憂江山百年有此客雲樹六月生凉秋世上紅塵爭百日一丘一壑去來休鄧州城樓鄧州城下湍水流鄧州城隅多古丘隆中布衣不復見浮雲西北空悠悠長鯨駕空海波立老鶴呼月蒼烟愁自古江山感遊子今人誰解賦登樓太白獨酌圖謫仙去世三百年海中鯨魚𣺌翩翩豈知龍眠天馬筆忽有玉樹秋風前金鑾歸來身散仙世事悠悠白髮邊㑹稽賀老何處在千里名山入酒船清景巳隨詩句盡風流合向畫圖傳往時長安酒家眠焦遂不狂張不顛想得三更風露下醉和江月弄江烟劉逺筆老㕙力能舉玉杵文陣挽强猶百鈞惜哉變化太狡獪嚮也褐衣今虎文宣城諸葛寂無聞前後兩劉新冊勲謝郎神鋒恨太雋雖然豈不超人羣三錢雞毛吐皇墳尖奴定能張吾軍何時酌我百壺酒為汝醉草垂天雲劉時舉節制雲南雲南山高去天尺漢家弦聲雷破壁九州之外更九州海色澄清映南極幽并豪俠喜功名咄嗟顧盼風雲生今年肘後印如斗過眼巳覺烏蠻平諭蜀相如今老矣不妨銅柱有新名段志堅書龍為劉鄧州賦豬龍可豢亦可屠世人畫蛇復畫魚天飛忽入阿堅筆始覺衆史欺庸愚腥風萬里來白浪横江湖一麾走海若再顧失天吳浩蕩明河翻尾鬛慘不濡只愁紙上出雷火搏空大千如此珠天生神物與化俱滅没變見何所無逆鱗自古不受觸乃今縮頭隨巻舒怪得堂堂髯御史平生長有雨隨車湧金亭同遊諸君太行元氣老不死上與左界分山河有如巨鼇昻頭西入海突兀已過餘坡陁我從汾晉來山之面目腹背皆經過濟源盤谷非不佳烟景獨覺蘇門多湧金亭下百泉水海眼萬古流山阿觱沸濼水源奫淪晉溪波雲雷涵鬼物窟宅深蛟鼉水妃簸弄明月璣地藏發泄天不訶平湖油油碧於酒雲錦十里翻風荷我來適與風雨㑹世界三日漫兠羅小行不得山北望空長哦今朝一掃衆峰出千鬟萬髻高峩峩空青斷石壁微茫散烟蘿山陽十月未搖落翠􅅋雲旗相蕩摩雲烟故為出濃淡魚鳥似欲留婆娑石間仙人迹石爛迹不磨仙人去不返六龍忽蹉跎江山如此不一醉撫掌笑煞孫公和長安城頭烏頸訛并州少年夜枕戈舉杯為問謝安石蒼生今亦如卿何元子樂矣君其歌天門引秦王深居不得近從破衡成欲誰信白頭遊客困咸陽憔悴黄金百斤盡海中仙人黄鵠舉大笑人間爭腐鼠丈夫何意作蘇秦六印才堪驚兒女古來多為虚名老不見阿房淨如掃千年虎豹守天門一日牛羊卧秋草蛟龍引古劍咸陽墓中得抉開青雲見白日蛟龍地底氣如虹土花千年不敢蝕洪鑪烈焰初騰精横海已覺無長鯨世上元無倚天手匣中誰解不平鳴割城恨不逢相如佐酒恨不逢朱虛尚方未入朱雲請盟盤合與毛生俱誰念田文坐中客只將彈鋏嘆無魚芳華怨娃兒十八嬌可憐亭亭裊裊春風前天上仙人玉為骨人間畫工畫不出小小油壁車軋軋出東華金縷盤雙帯雲裾踏雁沙一片朝雲不成雨被風吹去落誰家少年豈無恩澤侯金鞍綉㡌亦風流不然典取鷫鸘裘四壁相如堪白頭金谷樓臺悄無主燕子不來花著雨只知環佩作離聲誰向琵琶得私語無情鸂􅈃翡翠兒有情蜂雄蛺蝶雌勸君滿酌金屈巵明日無花空折枝征人怨瀚海風烟掃易空玉闗歸路幾時東塞垣可是秋寒早一夜清霜滿鏡中隋故宫行渭川楊栁先得春二月鶯啼百囀新長春宫中千樹錦暖日晴雲思煞人君王半醉唱吳歌綘仙起舞嚬翠蛾吳兒謾説曾行樂三十六宫能幾多千秋萬古金銀闕海没三山一毫髮繁華夢覺人不知留得寒螿泣秋月解劍行古劍黑於漆鬱鬱動星文摩挲二十年今日持贈君長鯨鼔浪三山没知君不是泥中物袖中一巻白猿書未分持刀賣黄犢壯懷風雲鬱沉沉慚愧漂母無千金長安侏儒飽欲死萬古不解天公心北風浩浩吹行客隴水無聲雪花白荆卿墓頭秋草乾擊筑行歌欲誰識君不見秦相五羖皮去時烹雞炊扊扅又不見敝裘蘇季子合從歸來印纍纍丈夫隨地自有萬里氣翕忽變化安能知大冠如箕望吾子富貴同生亦同死春風來春風來時瑤草芳緑池珠樹宿鴛鴦春風去後瑤草歇來鴻去燕遙相望鴛鴦不得雙燕鴻天一方娟娟愁眉色靜與遙山長錦衾覆羅薦夢語相思怨月明烏夜啼空閨淚如霰送登封張令西上罷縣人稱屈悠悠復此行渭城秋雁到秦嶺暮雲平道路衣從典風塵劍巳鳴山西多俠客莫説是書生孟州夾灘飲承之御史家美酒禁愁得芳梅發興饒紛紜聊且置磈磊故須澆雞黍成前約干戈有此宵平生楊大理惜不與佳招送曹吉甫兼及通甫意氣羡君豪憐君屈騎曹安能事筆硯且復混弓刀風雪貂裘暗闗山馬骨高南飛見鴻鴈應為惜哀勞落魄落魄宜多病艱危更百憂雨聲孤館夜草色故園秋行役魚頳尾歸期烏白頭中州遂南北殘息付悠悠酬中條李隱居邦彦州路限南北相逢今白頭蟲沙非故國人物自名流學道慚高步留詩惜暗投歸秦如有便終伴竹林遊京兆漕司官居符節推通貴江山入勝遊名園隨地改高棟與雲浮簿領歸閒暇鶯花接獻酬不知秋夜月何似庾公樓横波亭孤亭􅋓兀揷飛流氣壓元龍百尺樓萬里風濤接瀛海千年豪傑壯山丘疎星淡月魚龍夜老木清霜鴻鴈秋倚劍長歌一杯酒浮雲西北是神州度太白巔住昆陽斷崖絶壁裂蒼巔竟日長林窈窕間舊許烟霞歸白髮悔隨塵土出青山饑蠶濈濈催人老野鶴昻昻羡汝閒畏景方隆路方永南風迴首暮雲還昆陽古木荒烟集暮鴉高城落日隱悲笳并州倦客初投迹楚澤寒梅又過花滿眼旌旗驚世路閉門風雪羡山家忘憂只有清樽在暫為紅塵拂鬢華中山寒食小雨班班浥曙烟平林簇簇㸃晴川清明寒食連三月潁水崧山又一年樂事漸隨花共減歸心長與鴈相先平生最有登臨興百感中來只慨然除夜一燈明暗夜如何夢寐衡門在澗阿物外烟霞玉華逺花時車馬洛陽多折腰真有陶潛興扣角空傳寗戚歌三十七年今日過可憐出處兩蹉跎劉光甫内鄉新居豸冠平日凛秋霜老去聲名只閉藏父老漸來同保社兒童久已愛文章蔬隨隙地皆成圃竹放新梢欲過墻為向長安舊遊道世間無有北窗凉秋夜九死餘生氣息存蕭條門巷似荒村春雷謾説驚坯户皎日何曾入覆盆濟水有情添别淚吳雲無夢寄歸魂百年世事兼身事樽酒何人與細論送輔之仲庸還大梁驊騮爭道𣺌翩翩誰遣風塵失少年四壁舊聞懸磬宅一囊今有賣書錢淋浪别酒青燈夜滅没孤舟落照邊想得還家過春半故山喬木滿蒼烟鎮州與文舉百一飲翁仲遺墟草棘秋蒼龍雙闕記神州只知終老歸唐主忽漫相看是楚囚日月盡隨天北轉古今誰見海西流眼中二老風流在一醉從教萬事休衞州感事神龍失水似蜉蝣一舸蒼皇入宋州紫氣已沉牛斗夜白雲空望帝鄉秋刦前寶地三千界夢裏瓊枝十二樓欲就長河問遺事悠悠東注不還流桐川與仁卿飲瀟瀟茅屋繞清灣四面雲開碧玉環已分故人成死別寧知尊酒對生還風流豈落正始後詩巻長留天地間海内斯文君未老不須辛苦賦囚山十二月十六日還冠氏十六日夜雪少日鶱飛掣臂鷹只今癡鈍似秋蠅躭書業力貧猶在涉世筋骸老不勝千里闗河高骨馬四更風雪短檠燈一缾一鉢平生了慚愧南窗打睡僧寄楊飛卿客夢悠悠信轉蓬紙窗殷殷動晨鐘西風白髮三千丈故國青山一萬重沙水有情留過鴈乾坤多事泣秋蟲三間老屋知何處慚愧雲間陸士龍隱亭同麻知幾賦零落棲遲復此遊一尊聊得散羇愁天圍平野滿無際水遶孤城閒不流栁意漸迴淮浦暖鴈聲仍帯塞門秋登高望逺令人起欲買烟波無釣舟感興倚梯從昔望雲霄七葉何人竟珥貂道路常教車厯鹿功名惟有鬢飄蕭勤如韓子初無補晚似馮公豈見招五十三年等閒裏一窗風葉雨瀟瀟春寒草木荒城屋數椽春寒閭巷益蕭然僮奴樵㸑頭如葆稚女跳梁履又穿白石鯉魚空半尺朱門食客自三千松枝麈尾山中滿去去南華有内篇即事商師國器見免從軍逋客如今不屬官住山盟在未應寒書生本自無燕頷造物何嘗戱鼠肝㑹最指天容我懶鴟夷盛酒盡君歡到家慈母應相問為説將軍禮數寛出都漢宫曾動伯鸞歌事去英雄不奈何但見觚稜上金爵豈知荆棘卧銅駝神仙不到秋風客富貴空悲春夢婆行過盧溝重迴首鳯城平日五雲多吕國材家醉飲世事悠悠殊未涯七年回首一長嗟虚傳庾信凌雲筆無復張騫犯斗槎去國衣冠有今日春風桃李是誰家螺臺剩有如川酒暫為紅塵拂鬢華别周卿弟晚歲論詩辱見收相從許久重相留苦心亦有孟東野真賞誰如高蜀州萬疊寒雲度歸鴈孤洲春水澹沙鷗荒城後日思君處風色蕭蕭人白頭寄叔星斗龍門姓字新豈知書劍老風塵郎君未省曾開閣王翰何縁得買隣銀燭對談詞館夜雪梅同醉浙江春祗應千里東州月處處相逢即故人夜宿秋香亭有懷本菴英上人兄弟論交四十年相從旬日却無縁去程氷雪詩仍在晚節風塵私自憐蓮社舊容元亮酒藤溪多負子猷船茅齋一夕愁多少窗竹瀟瀟耿不眠哭樊帥自倚沉寃有舌存爭教無路叩天閽傾囊已竭千金賜絶幕誰招萬里魂東道謾悲梁苑客南園多負壽張孫春風花落歌聲在夢裏能來共酒尊送樊順之弓刀十驛岳連州渭水秦山得意秋王粲從軍正年少庾郎入幕更風流寒鄉况味真雞肋清鏡功名屬虎頭寄謝溪風亭上月老夫乘興欲西遊大名贈荅張柬之營平豪宕變溫文所見今知勝所聞只道生涯無長物爭教詩壘有奇勲伐薪未敗煩名士載酒能來過子雲後日山陽養衰疾藥籠仙品正須君栁亭雨夕與高御史夜話闗塞無縁笑語同偶然情話此從容青天蜀道不得過山色歸心空自濃九日茱萸藍澗酒十年朝馬景陽鐘三間老屋知何處惆悵雲間陸士龍贈蕭漢傑射虎將軍右北平短衣憔悴宿長亭雷轟寶劍無留迹火借青囊為乞靈四壁不知貧作祟一瓢誰識醉中醒相逢莫話榰機石自省枯槎是客星送曹幹臣和林音驛日懷思燕市歌歡有此時老我真成鐵爐步感君時送草堂貲黄楊舊厄三年閏赤驥非無干里姿平地烟霄付公等不妨閒和鳯池詩杏花雜詩暖日園林可散愁毎逢花處儘遲留青旗知是誰家酒一片春風出樹頭小橋南北夢幽尋殘醉瞢騰不易禁一樹杏花春寂寞惡風吹折五更心楚客離魂不易招野春平碧水迢迢垂楊也被多情惱瘦損春風十萬條惠崇蘆鴈江湖牢落太愁人同是天涯萬里身不似畫屛金孔雀離離花影淡生春步虚詞閬苑仙人白錦袍海山宫闕醉蟠桃三更月底鸞聲急萬里風頭鶴背高萬神朝罷出通明和氣歡聲滿玉京見説人間有新異緑章封事謝昇平琪樹明霞碧落宫歌音嫋嫋度泠風人間聽得霓裳慣猶恐鈞天是夢中劉鄧州家聚鴨圖沙浦空明洲景微枯荷折葦淡相依若為化作江鷗去拍拍隨君貼水飛無題春風也解惜多才嫁與桃花不用媒死恨天台老劉阮人間何戀却歸來雜著天上河源地上流黄金浮世等閒休埋愁不著重泉底儘向人間種白頭昨日東周今日秦咸陽烟火洛陽塵百年蟻穴蜂衙裏笑煞崑崙頂上人半紙虛名百戰身轉頭高塚卧麒麟山間曾見漁樵説辛苦凌烟閣上人登珂山寺淡淡長空白鳥迴江山都入妙高臺六鼇只解翻溟渤不見東南日觀來奉酬子京禪師見贈舊遊重憶故人詩一㸃青燈兩鬢絲不似戒壇明月夜杏花香裏唱歌時聊城寒食輕陰何負探花期白髮於春自不宜城外杏園人去盡煮茶聲裏獨支頥南闗風裏秋蓬不自由一生幾度過隆州無情團栢闗前水流盡朱顔到白頭太一蓮舟圖太一青藜出漢年明窗開巻一欣然憑君莫問題詩客不是韓駒第二篇黄華峪團團石甕琢青瑤仰面看雲覺動搖誰著天瓢灑飛雨半空翻轉玉龍腰峽口食鯿魚有感無奈微雲疎雨何孟公詩律費研磨憑君莫愛襄陽好縮項鯿魚刺更多三鄉雜詩夢寐滄洲爛漫游西風安得釣魚舟薄雲樓閣兀烘暑細雨林塘已帯秋王子文琴齋天上秋風月底霜求凰一曲鬢絲長相如四壁消何物直要文君典鷫鸘留贈丹陽王煉師信得人間比夢間一巵芳酒且開顔當時笑伴今誰在詩客凄凉飯顆山敝盡貂裘白髮新京華旅食記前身仙翁相見休相笑同是邯鄲枕上人梁園春雙鳯簫聲隔綵霞宫鶯催賞玉谿花誰憐麗澤門邊栁瘦倚東風望翠華西樓曲游絲落絮春漫漫西樓晚晴花作團樓中小婦弄瑤瑟一曲未終坐長嘆去年與君西入闗春風浩蕩隨金鞍今年匹馬妾東還零落芙蓉秋色寒并刀不剪東流水湘竹年年泪㾗紫海枯石爛兩鴛鴦只今雙飛便雙死重城車馬紅塵起乾鵲無端為誰喜鏡中獨語人不知欲挿花枝泪如洗王庭筠黄華山絶句帝遣名山䕶此邦千家瑟瑟嵌西窗山僧乞與山前地招客先開四十雙瑟瑟寶名山色似之故曰嵌舊唐書南詔以田四畆為一雙挂鏡臺西挂玉龍半山飛雪舞天風寒雲直上三千尺人道高歡避暑宫元藝圃集巻一
